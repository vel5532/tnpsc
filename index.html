<title>TEST 11 — TNPSC Exam Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;600;700&family=DM+Sans:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>

<style>
:root{
  --bg:#0f1729;--sf:#1a2540;--s2:#243152;--s3:#2d3d66;
  --bd:rgba(255,255,255,.1);--b2:rgba(255,255,255,.16);
  --tx:#f0f4ff;--mu:#8899cc;
  --ac:#f59e0b;--a2:#fbbf24;--a3:#0ea5e9;
  --gn:#10b981;--rd:#ef4444;--or:#f97316;--yw:#eab308;
  --nh:58px;--bh:66px;
}
.light{--bg:#f8faff;--sf:#fff;--s2:#eef2ff;--s3:#e2e8ff;--bd:#dde2f5;--b2:#c5cce8;--tx:#0f172a;--mu:#4a5580;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100%;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.ta{font-family:'Noto Sans Tamil','DM Sans',sans-serif!important}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
input,select,textarea,button{font-family:'DM Sans',sans-serif;border:none;outline:none}
button{cursor:pointer;background:none;color:inherit}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes scaleIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(109,40,217,.35)}50%{box-shadow:0 0 45px rgba(109,40,217,.65)}}
@keyframes blink{0%,100%{border-color:var(--a2)}50%{border-color:var(--a3)}}
@keyframes progress{from{width:0}to{width:100%}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

/* LAYOUT */
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.topnav{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:300;height:var(--nh);display:flex;align-items:center;padding:0 14px;gap:10px;background:rgba(12,12,24,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd)}
.light .topnav{background:rgba(241,241,252,.95)}
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:300;height:var(--bh);display:flex;align-items:stretch;padding:6px 4px 10px;background:var(--sf);border-top:1px solid var(--bd);gap:2px}
.page{padding:calc(var(--nh)+14px) 14px calc(var(--bh)+18px);animation:fadeUp .3s ease}
.fullpage{min-height:100vh;display:flex;flex-direction:column;overflow-y:auto}
.exampage{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* BOTTOM NAV */
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-radius:12px;font-size:10px;font-weight:700;color:var(--mu);transition:all .2s;padding:4px 2px;cursor:pointer}
.bni.on{color:var(--a2);background:rgba(139,92,246,.1)}
.bni .ic{font-size:22px;line-height:1;transition:transform .2s}
.bni.on .ic{transform:scale(1.12)}

/* CARDS */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:16px;overflow:hidden}
.cp{padding:16px}
.press:active{transform:scale(.97);opacity:.95}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px 20px;border-radius:14px;font-weight:700;font-size:15px;transition:all .18s;cursor:pointer;border:none}
.btn:active{transform:scale(.95)}
.btn-p{background:linear-gradient(135deg,var(--ac),var(--a2));color:#fff;box-shadow:0 4px 18px rgba(109,40,217,.3)}
.btn-s{background:var(--s2);color:var(--tx);border:1.5px solid var(--bd)}
.btn-g{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
.btn-r{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff}
.btn-o{background:linear-gradient(135deg,#d97706,#f97316);color:#fff}
.btn-sm{padding:9px 16px;font-size:13px;border-radius:11px}
.btn-xs{padding:6px 11px;font-size:12px;border-radius:9px;width:auto;font-weight:700}

/* INPUTS */
.inp{width:100%;padding:13px 16px;background:var(--s2);border:1.5px solid var(--bd);border-radius:13px;color:var(--tx);font-size:15px;transition:border-color .2s}
.inp:focus{border-color:var(--a2)}
.iw{position:relative}
.iico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:17px;pointer-events:none}
.ipl{padding-left:44px}
.ig{margin-bottom:14px}
.ig label{display:block;font-size:11px;font-weight:700;color:var(--mu);margin-bottom:6px;letter-spacing:.6px;text-transform:uppercase}

/* OTP */
.otp-row{display:flex;gap:12px;justify-content:center;margin:22px 0}
.otp-box{width:56px;height:62px;border-radius:14px;border:2px solid var(--bd);background:var(--s2);color:var(--tx);font-size:26px;font-weight:900;text-align:center;transition:all .2s}
.otp-box:focus{border-color:var(--a2);box-shadow:0 0 0 3px rgba(139,92,246,.2);animation:blink 1.2s ease infinite}
.otp-box.filled{border-color:var(--a2);background:rgba(139,92,246,.08)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}
.b-easy{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.3)}
.b-medium{background:rgba(234,179,8,.15);color:#eab308;border:1px solid rgba(234,179,8,.3)}
.b-hard{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.s-active{background:rgba(16,185,129,.15);color:#10b981;border:1px solid rgba(16,185,129,.3)}
.s-pending{background:rgba(14,165,233,.15);color:#0ea5e9;border:1px solid rgba(14,165,233,.3)}
.s-suspended{background:rgba(234,179,8,.15);color:#eab308;border:1px solid rgba(234,179,8,.3)}
.s-banned{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}

/* QLANG SWITCHER */
.qlang{display:flex;gap:0;background:var(--s2);border:1.5px solid var(--bd);border-radius:12px;padding:3px;width:fit-content}
.ql-btn{padding:7px 18px;border-radius:9px;font-size:12px;font-weight:800;cursor:pointer;transition:all .2s;color:var(--mu)}
.ql-btn.on{background:var(--ac);color:#fff;box-shadow:0 2px 8px rgba(109,40,217,.3)}

/* MODAL / SHEET */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:400;display:flex;align-items:flex-end;animation:fadeIn .18s}
.sheet{background:var(--sf);border-radius:22px 22px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:18px 18px 32px;animation:slideUp .26s ease}
.pill{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto 16px}

/* OPTIONS */
.opt{display:flex;align-items:flex-start;gap:12px;padding:13px 14px;border-radius:14px;border:2px solid var(--bd);cursor:pointer;transition:all .18s;background:var(--sf);margin-bottom:10px;width:100%;text-align:left}
.opt:active{transform:scale(.98)}
.opt.sel{border-color:var(--a2);background:rgba(139,92,246,.08)}
.opt.ok{border-color:var(--gn);background:rgba(16,185,129,.08)}
.opt.ng{border-color:var(--rd);background:rgba(239,68,68,.08)}
.opt-lt{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;transition:all .18s}

/* PALETTE */
.pal{display:grid;grid-template-columns:repeat(8,1fr);gap:5px}
.pb{aspect-ratio:1;border-radius:7px;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;transition:all .15s}
.pb:active{transform:scale(.88)}
.p0{background:var(--s2);color:var(--mu)}
.p1{background:var(--gn);color:#fff}
.p2{background:var(--or);color:#fff}
.p3{background:var(--ac);color:#fff}
.p4{background:rgba(239,68,68,.25);color:var(--rd)}

/* STATS */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.sb{padding:14px;border-radius:14px;background:var(--sf);border:1px solid var(--bd);text-align:center}

/* PBAR */
.pbar{height:5px;background:var(--s2);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .7s ease}

/* UPLOAD ZONE */
.dropzone{border:2px dashed var(--bd);border-radius:18px;padding:36px 20px;text-align:center;cursor:pointer;transition:all .3s}
.dropzone.drag{border-color:var(--a2);background:rgba(139,92,246,.07)}
.dropzone:hover{border-color:var(--a2)}

/* PROCESSING STEPS */
.step-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;margin-bottom:8px;font-size:13px;font-weight:600;transition:all .3s}
.step-done{background:rgba(16,185,129,.1);color:var(--gn)}
.step-active{background:rgba(139,92,246,.12);color:var(--a2)}
.step-wait{background:var(--s2);color:var(--mu)}

/* SHIMMER SKELETON */
.skel{background:linear-gradient(90deg,var(--s2) 25%,var(--s3) 50%,var(--s2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:10px}

/* TOAST */
.toast{position:fixed;top:calc(var(--nh)+10px);left:50%;transform:translateX(-50%);z-index:999;background:var(--sf);border:1px solid var(--bd);border-radius:13px;padding:11px 18px;font-size:13px;font-weight:600;white-space:nowrap;box-shadow:0 8px 28px rgba(0,0,0,.4);animation:scaleIn .22s ease;display:flex;align-items:center;gap:8px;max-width:94vw}

.stitle{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:12px}
.divider{height:1px;background:var(--bd);margin:14px 0}

/* TEST 11 BRAND STYLES */
.brand-logo {
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(135deg,var(--ac),var(--a3));
  display:flex;align-items:center;justify-content:center;font-size:20px;
}
.amber-text { color:var(--ac); }
.glass {
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,.1);
}
@keyframes glow2{0%,100%{box-shadow:0 0 20px rgba(245,158,11,.2)}50%{box-shadow:0 0 40px rgba(245,158,11,.5)}}
.glow-amber{animation:glow2 3s ease-in-out infinite}
/* Better card hover */
.card:hover{border-color:var(--b2)}
/* Timer */
.timer-crit{animation:pulse 1s infinite;color:var(--rd)!important}
/* Score ring */
.score-ring svg{filter:drop-shadow(0 0 8px rgba(16,185,129,.3))}

/* ── ROOM / MULTIPLAYER STYLES ── */
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.15)}}
@keyframes countIn{from{transform:scale(2);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes slideRight{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes rankUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}

.live-dot{width:8px;height:8px;border-radius:50%;background:var(--gn);display:inline-block;animation:livePulse 1.5s ease-in-out infinite;box-shadow:0 0 6px var(--gn)}
.room-code{font-family:'DM Mono',monospace;font-size:28px;font-weight:900;letter-spacing:6px;color:var(--ac);text-align:center;padding:16px;background:rgba(245,158,11,.08);border:2px solid rgba(245,158,11,.3);border-radius:14px}
.code-box{width:44px;height:52px;border-radius:11px;border:2px solid var(--bd);background:var(--s2);color:var(--tx);font-size:22px;font-weight:900;text-align:center;font-family:'DM Mono',monospace;transition:all .2s;text-transform:uppercase}
.code-box:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(245,158,11,.15)}
.player-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;background:var(--s2);border:1px solid var(--bd);margin-bottom:8px;transition:all .3s;animation:slideRight .3s ease}
.player-row.you{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3)}
.player-avatar{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--ac),var(--a3));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:15px;color:#000;flex-shrink:0}
.rank-badge{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:13px;flex-shrink:0}
.rank-1{background:linear-gradient(135deg,#f59e0b,#fcd34d);color:#000}
.rank-2{background:linear-gradient(135deg,#94a3b8,#cbd5e1);color:#000}
.rank-3{background:linear-gradient(135deg,#b45309,#d97706);color:#fff}
.rank-other{background:var(--s3);color:var(--mu)}
.room-status{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700}
.status-waiting{background:rgba(14,165,233,.15);color:var(--a3);border:1px solid rgba(14,165,233,.3)}
.status-live{background:rgba(16,185,129,.15);color:var(--gn);border:1px solid rgba(16,185,129,.3)}
.status-done{background:rgba(100,116,139,.15);color:var(--mu);border:1px solid rgba(100,116,139,.3)}
.leaderboard-bar{height:100%;border-radius:4px 4px 0 0;transition:height 1s ease;min-height:4px}
</style>

<script type="module">
import { initializeApp }       from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth, RecaptchaVerifier, signInWithPhoneNumber,
  signOut, onAuthStateChanged, updateProfile
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import {
  getFirestore, doc, setDoc, getDoc, updateDoc,
  collection, addDoc, getDocs, query, where, orderBy, limit, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// ══════════════════════════════════════════════════════
// FIREBASE CONFIG
// Replace these values with yours from:
// console.firebase.google.com → Project Settings → Your Apps
// ══════════════════════════════════════════════════════
const firebaseConfig = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT.firebaseapp.com",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};

try {
  const fbApp  = initializeApp(firebaseConfig);
  const fbAuth = getAuth(fbApp);
  const fbDb   = getFirestore(fbApp);

  window._firebase = {
    auth: fbAuth,
    db:   fbDb,
    // Phone Auth
    RecaptchaVerifier,
    signInWithPhoneNumber,
    // Other Auth
    signOut,
    onAuthStateChanged,
    updateProfile,
    // Firestore
    doc, setDoc, getDoc, updateDoc,
    collection, addDoc, getDocs,
    query, where, orderBy, limit, deleteDoc,
  };

  console.log("✅ Firebase + Phone Auth ready");
} catch(e) {
  console.warn("⚠️ Firebase not configured — running in DEMO mode. OTP = 1234");
  window._firebase = null;
}
</script>

const TNPSC_2019_QS = [{"id": 1, "q": "Match List I and List II — Planets and Number of natural satellites: Mars, Jupiter, Saturn, Uranus with 60, 27, 63, 2 satellites", "opts": ["(a)1 (b)2 (c)3 (d)4", "(a)4 (b)3 (c)1 (d)2", "(a)1 (b)4 (c)2 (d)3", "(a)4 (b)1 (c)3 (d)2"], "ans": 1, "topic": "Science", "chapter": "Solar System", "diff": "Medium", "exp": "Mars has 2, Jupiter has 63, Saturn has 27, Uranus has 27 natural satellites. Answer is (a)4 (b)3 (c)1 (d)2.", "con": "Planets and Moons"}, {"id": 2, "q": "The compound used in breath analysis test for drunken driving is", "opts": ["K₂Cr₂O₇", "KI", "KMnO₄", "CuSO₄"], "ans": 0, "topic": "Science", "chapter": "Chemistry", "diff": "Medium", "exp": "K₂Cr₂O₇ (Potassium dichromate) is used in breath analysis for detecting alcohol. It turns green when it oxidises ethanol.", "con": "Chemical Analysis"}, {"id": 3, "q": "Which Metro Rail Corporation has started the initiative to become the World's first 100% solar-powered metro?", "opts": ["Jaipur Metro Rail Corporation Ltd.", "Gujarat Metro Rail Corporation Ltd.", "Delhi Metro Rail Corporation Ltd.", "Chennai Metro Rail Corporation Ltd."], "ans": 2, "topic": "Current Affairs", "chapter": "Environment", "diff": "Medium", "exp": "Delhi Metro Rail Corporation Ltd. started the initiative to become the world's first 100% solar-powered metro.", "con": "Renewable Energy"}, {"id": 4, "q": "As per G-20 surveillance note, India's economy is to grow at _______ in the year 2020.", "opts": ["6.5%", "5.5%", "7.5%", "8.5%"], "ans": 2, "topic": "Economics", "chapter": "Indian Economy", "diff": "Medium", "exp": "According to G-20 surveillance note, India's economy was projected to grow at 7.5% in 2020.", "con": "Economic Growth"}, {"id": 5, "q": "In the year 1951, Population growth rate is called", "opts": ["Year of Great Divide", "Year of Population Explosion", "Year of Population", "Year of Small Divide"], "ans": 3, "topic": "Economics", "chapter": "Population", "diff": "Medium", "exp": "1951 is called 'Year of Small Divide' in terms of population growth rate in India.", "con": "Population Studies"}, {"id": 6, "q": "In which desert is Noor Complex located?", "opts": ["Sahara Desert", "Thar Desert", "Kalhari Desert", "Gopi Desert"], "ans": 0, "topic": "Geography", "chapter": "World Geography", "diff": "Medium", "exp": "Noor Complex, one of the world's largest solar power plants, is located in the Sahara Desert in Morocco.", "con": "World Geography"}, {"id": 7, "q": "Which of the following statement(s) is/are correct? 1. In 2019, World Environment Day was Celebrated in China. 2. The Theme for the World Environment Day is Air Pollution.", "opts": ["1 and 2 are true", "1 is true, 2 is false", "1 and 2 are false", "2 is true, 1 is false"], "ans": 0, "topic": "Current Affairs", "chapter": "Environment", "diff": "Medium", "exp": "Both statements are correct. World Environment Day 2019 was celebrated in China and the theme was 'Air Pollution'.", "con": "World Environment Day"}, {"id": 8, "q": "The objective of Jandhan Yojana is", "opts": ["Financial inclusion", "Reducing regional disparities", "Social exclusion", "Population control"], "ans": 0, "topic": "Economics", "chapter": "Government Schemes", "diff": "Easy", "exp": "Jan Dhan Yojana's primary objective is financial inclusion — providing banking services to the unbanked population.", "con": "Government Schemes"}, {"id": 9, "q": "France has _______ party system.", "opts": ["Single party", "Biparty", "Multi party", "None"], "ans": 2, "topic": "Polity", "chapter": "World Politics", "diff": "Easy", "exp": "France has a Multi party system with many political parties participating in elections.", "con": "Political Systems"}, {"id": 10, "q": "Which water conservation campaign has been recently launched by the Central Government?", "opts": ["Jal Bachav Abhiyan", "Jal Tarang Abhiyan", "Jal Suraksha Abhiyan", "Jal Shakthi Abhiyan"], "ans": 3, "topic": "Current Affairs", "chapter": "Government Schemes", "diff": "Easy", "exp": "Jal Shakthi Abhiyan was launched by the Central Government for water conservation and rainwater harvesting.", "con": "Water Conservation"}, {"id": 11, "q": "The major port along the West Coast", "opts": ["Kandla", "Chennai", "Paradip", "Kolkata"], "ans": 0, "topic": "Geography", "chapter": "Indian Ports", "diff": "Easy", "exp": "Kandla (now Deendayal Port) is the major port along the West Coast of India in Gujarat.", "con": "Indian Ports"}, {"id": 12, "q": "In lower organisms sometimes the entire mature organisms do not form gametes but they themselves behave as gametes and the fusion of such mature individuals is known as", "opts": ["Anisogamy", "Merogamy", "Paedogamy", "Hologamy"], "ans": 3, "topic": "Science", "chapter": "Biology - Reproduction", "diff": "Hard", "exp": "Hologamy is when entire mature organisms behave as gametes and fuse together, seen in lower organisms.", "con": "Types of Gametic Fusion"}, {"id": 13, "q": "Match the following — Place and Leaders of the revolt: Delhi, Central India, Lucknow, Kanpur with Bhadur Shah II, Tantia Tope, Rani Laxmi Bai, Begum Hazarat Mahal", "opts": ["(a)2 (b)1 (c)3 (d)4", "(a)4 (b)3 (c)1 (d)2", "(a)1 (b)3 (c)4 (d)2", "(a)4 (b)2 (c)1 (d)3"], "ans": 1, "topic": "History", "chapter": "1857 Revolt", "diff": "Hard", "exp": "Delhi-Bhadur Shah II, Central India-Tantia Tope, Lucknow-Rani Laxmi Bai, Kanpur-Begum Hazarat Mahal.", "con": "1857 Revolt Leaders"}, {"id": 14, "q": "Who was selected as the first Chief Vigilance Commissioner of India?", "opts": ["Sharad Kumar", "B.K. Acharya", "Nittoor Srinivasa Rau", "R.P. Khanna"], "ans": 2, "topic": "Polity", "chapter": "Constitutional Bodies", "diff": "Hard", "exp": "Nittoor Srinivasa Rau was selected as the first Chief Vigilance Commissioner of India.", "con": "Constitutional Offices"}, {"id": 15, "q": "Consumer Protection Act is called as", "opts": ["Tamil Nadu Nugarvor Kavasam", "Consumer's Magna Carta", "World Nugarvor Kavasam", "Valuable Consumer Kavasam"], "ans": 1, "topic": "Polity", "chapter": "Consumer Rights", "diff": "Medium", "exp": "The Consumer Protection Act is called Consumer's Magna Carta as it is a charter of consumer rights.", "con": "Consumer Protection"}, {"id": 16, "q": "In which model of elections, the President and the Vice-President, the members of the Rajya Sabha are elected?", "opts": ["By-Elections", "Direct Election", "Indirect Election", "Mid-Term polls"], "ans": 2, "topic": "Polity", "chapter": "Elections", "diff": "Medium", "exp": "The President, Vice-President and Rajya Sabha members are elected through Indirect Election.", "con": "Electoral System"}, {"id": 17, "q": "Which of the following statements is/are correct? 1. The term of office of the Governor is five years. 2. He can remain in office till his successor enters upon the office of the Governor.", "opts": ["Both 1, 2 are correct", "only 1 is correct", "only 2 is correct", "Both 1, 2 are incorrect"], "ans": 0, "topic": "Polity", "chapter": "Governor", "diff": "Medium", "exp": "Both statements are correct. Governor has a 5-year term but continues until successor takes charge.", "con": "Governor's Office"}, {"id": 18, "q": "Which of the following statements about bases is/are true? I. Base releases hydroxide ions when dissolved in water. III. Zinc reacts with sodium hydroxide to form Sodium Zineate with liberation of hydrogen gas.", "opts": ["I and III", "II only", "III and IV", "IV and II"], "ans": 0, "topic": "Science", "chapter": "Chemistry - Acids & Bases", "diff": "Hard", "exp": "Bases release hydroxide ions (I) and Zinc reacts with NaOH to form Sodium Zincate + H₂ (III) are correct.", "con": "Properties of Bases"}, {"id": 19, "q": "Match List I with List II — Right to equality, Right to Freedom, Right to constitutional remedies, Right to freedom of religion with Articles", "opts": ["(a)2 (b)3 (c)4 (d)1", "(a)1 (b)4 (c)3 (d)2", "(a)3 (b)2 (c)1 (d)4", "(a)4 (b)1 (c)2 (d)3"], "ans": 0, "topic": "Polity", "chapter": "Fundamental Rights", "diff": "Medium", "exp": "Right to Equality-Art 14-18, Right to Freedom-Art 19-22, Constitutional Remedies-Art 32, Freedom of Religion-Art 25-28.", "con": "Fundamental Rights Articles"}, {"id": 20, "q": "From when Women were granted the right to vote in British India?", "opts": ["1920", "1921", "1922", "1923"], "ans": 1, "topic": "History", "chapter": "Freedom Movement", "diff": "Medium", "exp": "Women were granted the right to vote in British India from 1921.", "con": "Women's Rights"}, {"id": 21, "q": "In which year the Staff Selection Board was established in Tamilnadu during the Panagal Ministry?", "opts": ["1916", "1920", "1924", "1927"], "ans": 2, "topic": "History", "chapter": "Tamil Nadu History", "diff": "Hard", "exp": "The Staff Selection Board was established in Tamil Nadu in 1924 during the Panagal Ministry.", "con": "Tamil Nadu Administration"}, {"id": 22, "q": "Match the following religious books: Thembavani, Seerapuranam, Bhagvad Gita, Tripitakas with Hindus, Christians, Buddhists, Muslims", "opts": ["(a)4 (b)3 (c)1 (d)2", "(a)2 (b)1 (c)3 (d)4", "(a)1 (b)3 (c)4 (d)2", "(a)2 (b)4 (c)1 (d)3"], "ans": 3, "topic": "History", "chapter": "Religion", "diff": "Hard", "exp": "Thembavani-Christians, Seerapuranam-Muslims, Bhagvad Gita-Hindus, Tripitakas-Buddhists.", "con": "Religious Texts"}, {"id": 23, "q": "_______ was discovered in 1922 under the Supervision of R.D. Bannerji.", "opts": ["Mohenjadaro", "Harappa", "Lothal", "Kalibangan"], "ans": 0, "topic": "History", "chapter": "Ancient India", "diff": "Medium", "exp": "Mohenjodaro was discovered in 1922 under the supervision of R.D. Banerji near the Indus River.", "con": "Indus Valley Civilization"}, {"id": 24, "q": "Who was called as 'the father of Modern Currency' during the Mughal period?", "opts": ["Babur", "Akbar", "Shershah", "Shah Jahan"], "ans": 2, "topic": "History", "chapter": "Mughal Empire", "diff": "Medium", "exp": "Shershah Suri is called the 'father of Modern Currency' for introducing the silver rupee during the Mughal period.", "con": "Mughal Currency"}, {"id": 25, "q": "In the year 2017-18 The Per Capita Income (GSDP) of Tamil Nadu was", "opts": ["$1670", "$2200", "$1443", "$2175"], "ans": 1, "topic": "Economics", "chapter": "Tamil Nadu Economy", "diff": "Hard", "exp": "The Per Capita Income (GSDP) of Tamil Nadu in 2017-18 was $2200.", "con": "Tamil Nadu Economy"}, {"id": 26, "q": "The Utkal plain is found in _______ state.", "opts": ["Andhrapradesh", "Mumbai", "Odhisha", "Tamil Nadu"], "ans": 2, "topic": "Geography", "chapter": "Indian Geography", "diff": "Easy", "exp": "The Utkal plain is found in Odisha state, named after the historical region of Utkala.", "con": "Indian Plains"}, {"id": 27, "q": "0° longitude and 0° latitude is located in", "opts": ["Central Australia", "Brazil", "Atlantic South and West of Africa", "South pole"], "ans": 2, "topic": "Geography", "chapter": "World Geography", "diff": "Medium", "exp": "The intersection of 0° longitude (Prime Meridian) and 0° latitude (Equator) is located in the Atlantic Ocean, South and West of Africa.", "con": "Geographic Coordinates"}, {"id": 28, "q": "Swine Flu is caused by", "opts": ["Rubella virus", "Rhino virus", "H1N1 virus", "Alpha virus"], "ans": 2, "topic": "Science", "chapter": "Biology - Disease", "diff": "Easy", "exp": "Swine Flu is caused by the H1N1 virus (Influenza A virus subtype H1N1).", "con": "Viral Diseases"}, {"id": 29, "q": "The Androgen Binding protein is produced by", "opts": ["Hypothalamus", "Leydig cells", "Testosterone", "Sertoli cells"], "ans": 3, "topic": "Science", "chapter": "Biology - Reproduction", "diff": "Hard", "exp": "Androgen Binding Protein (ABP) is produced by Sertoli cells in the testes to maintain high testosterone levels.", "con": "Male Reproductive System"}, {"id": 30, "q": "Assertion (A): Blood samples are usually taken from the veins rather than artery. Reason (R): Low Pressure in the veins", "opts": ["Both (A) and (R) are true and (R) is the correct explanation of (A)", "(A) is true, (R) is false", "(A) is false, (R) is true", "Both (A) and (R) are true and (R) is not the correct explanation of (A)"], "ans": 0, "topic": "Science", "chapter": "Biology - Circulatory System", "diff": "Hard", "exp": "Blood is taken from veins because they have low pressure making it easier and safer. (R) correctly explains (A).", "con": "Blood Circulation"}, {"id": 31, "q": "Which of the following fact is incorrect about monocotyledonous plants?", "opts": ["Seed has single cotyledon", "Leaves have parallel venation", "Fibrous root system present", "Flowers are pentamerous"], "ans": 3, "topic": "Science", "chapter": "Biology - Botany", "diff": "Medium", "exp": "Monocot flowers are trimerous (parts in multiples of 3), NOT pentamerous. Pentamerous flowers are found in dicots.", "con": "Plant Classification"}, {"id": 32, "q": "Which of the following fact is incorrect about mitosis?", "opts": ["It occurs only in body cells", "Mitosis has two divisions", "Maintenance of 2n chromosomes", "Two diploid cells are produced"], "ans": 1, "topic": "Science", "chapter": "Biology - Cell Division", "diff": "Hard", "exp": "Mitosis has only ONE division (unlike meiosis which has two). It produces two identical diploid cells.", "con": "Cell Division"}, {"id": 33, "q": "Which of the following are wrong? I. Na₂CO₃ is used in softening hard water. II. NaHCO₃ is used for bleaching cotton and linen. IV. CaOCl₂ is used in making of baking powder.", "opts": ["I and IV", "II and IV", "I and III", "III and IV"], "ans": 1, "topic": "Science", "chapter": "Chemistry - Compounds", "diff": "Hard", "exp": "NaHCO₃ is not used for bleaching (that's NaOCl/bleaching powder). CaOCl₂ is bleaching powder not baking powder (NaHCO₃ is). II and IV are wrong.", "con": "Chemical Applications"}, {"id": 34, "q": "Focal length of a convex mirror whose radius of curvature 40 cm is", "opts": ["20 cm", "40 cm", "80 cm", "infinity"], "ans": 0, "topic": "Science", "chapter": "Physics - Optics", "diff": "Medium", "exp": "For a convex mirror, focal length = Radius of curvature / 2 = 40/2 = 20 cm.", "con": "Mirror Formula"}, {"id": 35, "q": "A man has to exert a force of 10 N at the edge of a door to push it open. How much force will the man have to exert if he pushes the centre of the door?", "opts": ["10 N", "5 N", "15 N", "20 N"], "ans": 3, "topic": "Science", "chapter": "Physics - Mechanics", "diff": "Medium", "exp": "Torque = Force × distance. At edge: T = 10×L. At centre: T = F×(L/2). So F = 20N for same torque.", "con": "Torque and Moments"}, {"id": 36, "q": "The first battery was made by", "opts": ["Joule", "George Simon Ohm", "Alessandro Volta", "Newton"], "ans": 2, "topic": "Science", "chapter": "Physics - Electricity", "diff": "Easy", "exp": "Alessandro Volta invented the first electric battery (Voltaic pile) in 1800. The unit Volt is named after him.", "con": "History of Electricity"}, {"id": 37, "q": "Kamaraj served as the Chief Minister of Tamil Nadu for", "opts": ["7 years", "8 years", "9 years", "10 years"], "ans": 2, "topic": "History", "chapter": "Tamil Nadu History", "diff": "Easy", "exp": "K. Kamaraj served as Chief Minister of Tamil Nadu for 9 years (1954-1963).", "con": "Tamil Nadu CM History"}, {"id": 38, "q": "GST came into effect on _______ in India.", "opts": ["29th March 2017", "1st July 2017", "29th March 2016", "1st July 2016"], "ans": 1, "topic": "Economics", "chapter": "Indian Economy", "diff": "Easy", "exp": "GST (Goods and Services Tax) came into effect on 1st July 2017 in India, replacing multiple indirect taxes.", "con": "GST Implementation"}, {"id": 39, "q": "Mutant variety of wheat is", "opts": ["Oenothera Lamarkiana", "Castor Aruna", "Sharbati Sonora", "Mirabilis Jalaba"], "ans": 2, "topic": "Science", "chapter": "Biology - Agriculture", "diff": "Hard", "exp": "Sharbati Sonora is a mutant variety of wheat developed through mutation breeding in India.", "con": "Crop Varieties"}, {"id": 40, "q": "Which of the following statement is not correct about Indus Valley Civilization?", "opts": ["Indus Valley people used burnt bricks", "This civilization flourished in India about 4700 years ago", "Harappa in Sindhi means 'Buried City'", "Hundreds of square seals were discovered here"], "ans": 3, "topic": "History", "chapter": "Ancient India", "diff": "Medium", "exp": "Thousands of rectangular/square seals were discovered at Indus Valley sites, but the number 'hundreds' is incorrect — it was thousands.", "con": "Indus Valley Civilization"}, {"id": 41, "q": "Which article of the Indian Constitution talks about 'Taxes levied and collected by the Union but assigned to the States'?", "opts": ["Art. 201", "Art. 269", "Art. 272", "Art. 268"], "ans": 1, "topic": "Polity", "chapter": "Finance", "diff": "Hard", "exp": "Article 269 of the Indian Constitution deals with taxes levied and collected by the Union but assigned to the States.", "con": "Constitutional Finance"}, {"id": 42, "q": "Baripada: I. A hamlet that Conserves Forest, promotes growth. II. Located in Maharastra-Gujarat border.", "opts": ["I is true but II is false", "I and II is true", "I is false but II is true", "I and II are false"], "ans": 1, "topic": "Current Affairs", "chapter": "Environment", "diff": "Hard", "exp": "Both are true. Baripada is a village that conserves forests and is located on the Maharashtra-Gujarat border.", "con": "Environmental Villages"}, {"id": 43, "q": "Chennai becomes the _______ Indian city with metro railway.", "opts": ["first", "fifth", "sixth", "second"], "ans": 2, "topic": "Current Affairs", "chapter": "Infrastructure", "diff": "Medium", "exp": "Chennai became the 6th Indian city to have metro railway service.", "con": "Metro Cities India"}, {"id": 44, "q": "When was Swachh Bharat Abhiyan was announced by the Prime Minister?", "opts": ["2 Oct 2013", "15 August 2014", "2 Oct 2015", "2 Oct 2016"], "ans": 1, "topic": "Current Affairs", "chapter": "Government Schemes", "diff": "Easy", "exp": "Swachh Bharat Abhiyan was announced by Prime Minister Modi on 15 August 2014 and launched on 2 October 2014.", "con": "Government Schemes"}, {"id": 45, "q": "How many political parties participated in the 1951 First Indian General Election?", "opts": ["54", "64", "74", "84"], "ans": 0, "topic": "Polity", "chapter": "Elections", "diff": "Medium", "exp": "54 political parties participated in the first Indian General Election held in 1951-52.", "con": "Indian Elections History"}, {"id": 46, "q": "India's central meridian passes through", "opts": ["Ahmedabad", "Mirzapur", "Greenwich", "Gujarat"], "ans": 1, "topic": "Geography", "chapter": "Indian Geography", "diff": "Medium", "exp": "India's Standard Time (IST) is based on 82.5°E longitude which passes through Mirzapur (Allahabad), Uttar Pradesh.", "con": "India Standard Time"}, {"id": 47, "q": "Who is the first Indian transgender to be honoured with 'Padmashri'?", "opts": ["Satyasree Sharmila", "Prithika Yashini", "Narthaki Natraj", "Tamilselvi"], "ans": 2, "topic": "Current Affairs", "chapter": "Awards", "diff": "Medium", "exp": "Narthaki Natraj, a classical Bharatanatyam dancer, became the first transgender to receive the Padma Shri award.", "con": "Padma Awards"}, {"id": 48, "q": "During 1857, the peasants had to pay heavy taxes in the form of", "opts": ["Land tax", "Customs duty", "Revenue tax", "Service tax"], "ans": 0, "topic": "History", "chapter": "1857 Revolt", "diff": "Easy", "exp": "During 1857, peasants had to pay heavy Land tax imposed by the British which was a major cause of the revolt.", "con": "Causes of 1857 Revolt"}, {"id": 49, "q": "Home rule league in Bombay was formed by", "opts": ["Bharathiar", "Mrs. Annie Besant", "Nehru", "Tilak"], "ans": 3, "topic": "History", "chapter": "Freedom Movement", "diff": "Medium", "exp": "Bal Gangadhar Tilak formed the Home Rule League in Bombay in 1916. Annie Besant formed a separate one in Madras.", "con": "Home Rule Movement"}, {"id": 50, "q": "The Central Vigilance Commission was established on the recommendation of", "opts": ["Administrative Reforms Commission", "National Development Council", "Santhanam Committee on Prevention of Corruption", "Law Commission"], "ans": 2, "topic": "Polity", "chapter": "Constitutional Bodies", "diff": "Hard", "exp": "CVC was established in 1964 on the recommendations of the Santhanam Committee on Prevention of Corruption.", "con": "Anti-Corruption Bodies"}, {"id": 51, "q": "The Chief Justice and other Judges of the Indian Supreme Court are appointed by", "opts": ["The President", "The Attorney General", "The Governor", "The Prime Minister"], "ans": 0, "topic": "Polity", "chapter": "Judiciary", "diff": "Easy", "exp": "The Chief Justice and other Judges of the Supreme Court of India are appointed by the President of India.", "con": "Judicial Appointments"}, {"id": 52, "q": "Which Amendment has made provisions related to 'Nagar Palikas' (Urban Local Governments)?", "opts": ["73rd Amendment Act", "75th Amendment Act", "74th Amendment Act", "70th Amendment Act"], "ans": 2, "topic": "Polity", "chapter": "Local Government", "diff": "Medium", "exp": "The 74th Constitutional Amendment Act (1992) made provisions for Nagar Palikas (Urban Local Bodies).", "con": "Constitutional Amendments"}, {"id": 53, "q": "Which Union Territory has its own elected Legislative Assembly?", "opts": ["Chandigarh", "Lakshadweep", "Puducherry", "Daman and Diu"], "ans": 2, "topic": "Polity", "chapter": "Union Territories", "diff": "Easy", "exp": "Puducherry (Pondicherry) has its own elected Legislative Assembly among the Union Territories of India.", "con": "Union Territories"}, {"id": 54, "q": "In Lok Sabha, how many members are elected directly by the people?", "opts": ["453", "354", "543", "545"], "ans": 2, "topic": "Polity", "chapter": "Parliament", "diff": "Medium", "exp": "543 members of Lok Sabha are directly elected by the people of India through universal adult franchise.", "con": "Lok Sabha"}, {"id": 55, "q": "Which right has // ═══ FIREBASE INTEGRATION HELPERS ═══
async function fbRegister(email, pw, name) {
  const fb = window._firebase;
  if (!fb) throw new Error("Firebase not configured");
  const cred = await fb.createUserWithEmailAndPassword(fb.auth, email, pw);
  await fb.updateProfile(cred.user, { displayName: name });
  const profile = { name, email, role:"student", joinedAt:new Date().toISOString(), streak:0 };
  await fb.setDoc(fb.doc(fb.db,"users",cred.user.uid), profile);
  // Save to local users for admin view
  const users = DB.users(); users.push({uid:cred.user.uid,...profile}); DB.saveUsers(users);
  return { user: cred.user, profile };
}

async function fbLogin(email, pw) {
  const fb = window._firebase;
  if (!fb) throw new Error("Firebase not configured");
  const cred = await fb.signInWithEmailAndPassword(fb.auth, email, pw);
  const snap = await fb.getDoc(fb.doc(fb.db,"users",cred.user.uid));
  const profile = snap.exists() ? snap.data() : { name:cred.user.displayName||email.split("@")[0], role:"student" };
  return { user: cred.user, profile };
}

async function fbLogout() {
  const fb = window._firebase;
  if (fb) await fb.signOut(fb.auth);
}

async function fbSaveResult(result) {
  const fb = window._firebase;
  if (!fb || !result.userId || result.userId.includes("_demo")) return;
  try { await fb.addDoc(fb.collection(fb.db,"results"), {...result, savedAt:new Date().toISOString()}); }
  catch(e) { console.warn("FB save result:", e.message); }
}

async function fbSaveTest(test, uid) {
  const fb = window._firebase;
  if (!fb) return;
  try { await fb.setDoc(fb.doc(fb.db,"tests",test.id), {...test, savedBy:uid, savedAt:new Date().toISOString()}); }
  catch(e) { console.warn("FB save test:", e.message); }
}

// ═══════════════════════════════════════
// AI — Generate MCQs using GROQ (FREE)
// Model: llama3-70b-8192 (free tier)
// Get key FREE at: console.groq.com
// ═══════════════════════════════════════
async function generateMCQs(text, subject, count, qLang, toast) {
  const key = DB.apiKey();
  if (!key) {
    toast({msg:"⚠️ No Groq API key — paste it in the box above!", type:"error"});
    return [];
  }

  const langInstr = qLang === "ta"
    ? "Write ALL questions, ALL answer options, and ALL explanations ONLY in Tamil language (தமிழ் மொழியில்). Do NOT use any English words in the question, options or explanation."
    : "Write all questions, options, and explanations in English.";

  // Groq has 8192 token context — keep chunk safe
  const chunk = text.slice(0, 6000);

  const prompt = `You are an expert MCQ generator for competitive exams like TNPSC and UPSC.

Generate exactly ${count} high-quality multiple choice questions from the text below.
Subject: ${subject}
${langInstr}

STRICT RULES:
- Questions must come ONLY from the provided text
- Do NOT add any facts not present in the text
- Each question must have exactly 4 options
- Only one option is correct
- Return ONLY a raw JSON array — no markdown, no explanation outside JSON

JSON format (return this exact structure):
[{"q":"Question?","opts":["A","B","C","D"],"ans":0,"exp":"Brief explanation.","topic":"Topic","chapter":"Chapter","diff":"Easy"}]

"ans" = 0-based index of correct answer (0=A, 1=B, 2=C, 3=D)
"diff" = Easy, Medium, or Hard

TEXT:
${chunk}`;

  // Groq supports CORS from browsers natively
  try {
    console.log("Calling Groq API, text length:", chunk.length);
    const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "Authorization": `Bearer ${key}`
      },
      body: JSON.stringify({
        model: "llama3-70b-8192",
        temperature: 0.3,
        max_tokens: 4096,
        messages: [
          {
            role: "system",
            content: "You are an expert exam question generator. You ONLY output valid JSON arrays. No markdown, no backticks, no explanation — just the raw JSON array starting with [ and ending with ]."
          },
          { role: "user", content: prompt }
        ]
      })
    });

    if (!res.ok) {
      const errText = await res.text().catch(()=>"");
      let errMsg = `HTTP ${res.status}`;
      try { errMsg = JSON.parse(errText)?.error?.message || errMsg; } catch(e2) {}
      console.error("Groq error:", res.status, errText);
      if(res.status===401) toast({msg:"❌ Invalid Groq key. Re-enter it in the box above.", type:"error"});
      else if(res.status===429) toast({msg:"⏳ Too many requests. Wait 60 seconds and retry.", type:"warning"});
      else if(res.status===400) toast({msg:"❌ Request error. Try reducing question count.", type:"error"});
      else toast({msg:`Groq Error ${res.status}: ${errMsg}`, type:"error"});
      return [];
    }

    const data = await res.json();
    const raw  = data.choices?.[0]?.message?.content || "";
    console.log("Groq raw response (first 300):", raw.slice(0,300));

    if (!raw.trim()) {
      toast({msg:"AI returned empty response. Try again.", type:"error"});
      return [];
    }

    // Robustly extract JSON array from response
    const clean = raw.replace(/```json|```/gi,"").trim();
    const start = clean.indexOf("[");
    const end   = clean.lastIndexOf("]");
    if(start===-1 || end===-1 || end<=start){
      console.error("No JSON array found in:", clean);
      toast({msg:"AI response was not valid JSON. Try fewer questions (5-10).", type:"error"});
      return [];
    }
    const jsonStr = clean.slice(start, end+1);
    const parsed  = JSON.parse(jsonStr);
    if(!Array.isArray(parsed) || parsed.length===0){
      toast({msg:"AI returned 0 questions. Try a different PDF or fewer questions.", type:"warning"});
      return [];
    }
    console.log("Generated", parsed.length, "questions successfully");
    return parsed;
  } catch(e) {
    console.error("generateMCQs error:", e);
    if(e.name === "TypeError" && e.message.includes("fetch")) {
      toast({msg:"Network error — check your internet connection.", type:"error"});
    } else if(e instanceof SyntaxError) {
      toast({msg:"AI returned invalid JSON. Try fewer questions (5-10).", type:"error"});
    } else {
      toast({msg:`Error: ${e.message}`, type:"error"});
    }
    return [];
  }
}

// ═══════════════════════════════════════
// READ FILE TEXT — uses PDF.js for PDFs
// ═══════════════════════════════════════
async function readFileText(file) {
  // Plain text files
  if (file.name.match(/\.(txt|docx)$/i)) {
    return new Promise(resolve => {
      const r = new FileReader();
      r.onload = e => resolve(e.target.result || "");
      r.onerror = () => resolve("");
      r.readAsText(file);
    });
  }

  // PDF — use PDF.js for proper text extraction
  if (file.name.match(/\.pdf$/i)) {
    try {
      // Set PDF.js worker
      if (window.pdfjsLib) {
        window.pdfjsLib.GlobalWorkerOptions.workerSrc =
          "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
      } else {
        // fallback: raw binary read
        throw new Error("PDF.js not loaded");
      }

      const arrayBuffer = await file.arrayBuffer();
      const pdf = await window.pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      let fullText = "";

      for (let i = 1; i <= pdf.numPages; i++) {
        const page    = await pdf.getPage(i);
        const content = await page.getTextContent();
        const pageText = content.items.map(item => item.str).join(" ");
        fullText += pageText + "\n";
      }

      const cleaned = fullText.replace(/\s{3,}/g, " ").trim();
      return cleaned.slice(0, 30000); // max 30k chars
    } catch(e) {
      console.error("PDF.js extraction error:", e);
      // Last resort: raw byte extraction
      return new Promise(resolve => {
        const r = new FileReader();
        r.onload = ev => {
          const arr  = new Uint8Array(ev.target.result);
          let text   = "";
          for (let i = 0; i < arr.length; i++) {
            const c = arr[i];
            if ((c >= 32 && c < 127) || c === 10 || c === 13) {
              text += String.fromCharCode(c);
            }
          }
          resolve(text.replace(/\s{3,}/g," ").trim().slice(0, 20000));
        };
        r.readAsArrayBuffer(file);
      });
    }
  }

  return "";
}

function Toast({msg,type,onClose}) {
  const C={success:"var(--gn)",error:"var(--rd)",info:"var(--ac)",warning:"var(--or)"};
  const I={success:"✅",error:"❌",info:"ℹ️",warning:"⚠️"};
  useEffect(()=>{const t=setTimeout(onClose,3500);return()=>clearTimeout(t)},[]);
  return <div className="toast" style={{borderLeft:`3px solid ${C[type]||C.info}`}}>
    <span>{I[type]||I.info}</span>
    <span style={{maxWidth:"80vw",whiteSpace:"normal",lineHeight:1.4,fontSize:13}}>{msg}</span>
    <button onClick={onClose} style={{fontSize:18,color:"var(--mu)",marginLeft:4,lineHeight:1}}>×</button>
  </div>;
}

function Donut({pct,color,size=80}) {
  const r=32,cx=40,cy=40,c=2*Math.PI*r,d=(Math.min(pct,100)/100)*c;
  return <svg width={size} height={size} viewBox="0 0 80 80">
    <circle cx={cx} cy={cy} r={r} fill="none" stroke="var(--s2)" strokeWidth="7"/>
    <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth="7"
      strokeDasharray={`${d} ${c}`} strokeDashoffset={c/4} strokeLinecap="round"/>
    <text x="40" y="37" textAnchor="middle" dominantBaseline="middle" fill={color} fontSize="14" fontWeight="900">{pct}%</text>
  </svg>;
}

        "auth/missing-phone-number":     "Phone number required.",
      };
      showToast({msg: msgs[err.code]||err.message||"Failed to send OTP", type:"error"});

      // Fallback to demo mode
      setOtpMode("demo");
      setStep("otp");
      setTimer(60);
      showToast({msg:"Falling back to demo mode — OTP is 1234",type:"warning"});
    }

    setLoad(false);
  };

  // ── STEP 2: Verify OTP ────────────────────────────────────
  const verifyOtp = async() => {
    const entered = otp.join("");
    if(entered.length !== 6){
      showToast({msg:"Enter the 6-digit OTP",type:"error"});
      return;
    }
    setLoad(true);

    try {
      let firebaseUser = null;

      if(otpMode === "firebase" && window._confirmationResult){
        // Verify with Firebase
        const result = await window._confirmationResult.confirm(entered);
        firebaseUser = result.user;

      } else {
        // Demo mode — check 1234 (padded to 6: "001234" or "1234" → accept both)
        const valid = entered === "001234" || entered === "001234" ||
                      entered.replace(/^0+/,"") === "1234" || entered === "123456";
        if(!valid){
          showToast({msg:"Wrong OTP. Demo OTP: 1234 (enter as 001234 or 001234)",type:"error"});
          setLoad(false); return;
        }
      }

      // OTP verified — now check user in our DB
      const users = DB.users();
      const found = users.find(u=>u.phone===phone);

      if(!found){
        // New user — go to register
        if(firebaseUser) window._pendingFirebaseUser = firebaseUser;
        setLoad(false);
        setStep("register");
        return;
      }

      // Check account status
      if(found.status==="banned")     { setBlocked("banned");     setStep("blocked"); setLoad(false); return; }
      if(found.status==="suspended")  { setBlocked("suspended");  setStep("blocked"); setLoad(false); return; }
      if(found.status==="pending")    { setBlocked("pending");    setStep("blocked"); setLoad(false); return; }

      // Update Firebase UID if available
      if(firebaseUser) { found.uid = firebaseUser.uid; DB.saveU(users); }

      DB.saveS(found); setUser(found);
      nav("home");
      showToast({msg:`Welcome back, ${found.name}! 👋`,type:"success"});

    } catch(err){
      console.error("Verify OTP error:", err);
      const msgs = {
        "auth/invalid-verification-code": "Wrong OTP. Check and try again.",
        "auth/code-expired":               "OTP expired. Tap Resend.",
        "auth/session-expired":            "Session expired. Tap Resend.",
      };
      showToast({msg: msgs[err.code]||"Invalid OTP. Try again.",type:"error"});
    }

    setLoad(false);
  };

  // ── STEP 3: Register new user ─────────────────────────────
  const register = async() => {
    if(!form.name.trim()){showToast({msg:"Full name is required",type:"error"});return;}
    setLoad(true);
    await new Promise(r=>setTimeout(r,400));

    const firebaseUser = window._pendingFirebaseUser;

    // Update Firebase display name
    if(firebaseUser){
      try{ await window._firebase?.updateProfile(firebaseUser,{displayName:form.name.trim()}); }catch(e){}
    }

    const newUser = {
      id:       firebaseUser?.uid || Date.now().toString(),
      uid:      firebaseUser?.uid || null,
      name:     form.name.trim(),
      phone,
      email:    form.email.trim(),
      role:     "student",
      status:   "pending",  // Admin must approve
      joinedAt: new Date().toISOString(),
    };

    const users = DB.users();
    users.push(newUser);
    DB.saveU(users);

    // Save to Firestore
    try{
      const fb = window._firebase;
      if(fb && newUser.uid){
        await fb.setDoc(fb.doc(fb.db,"users",newUser.uid), newUser);
      }
    }catch(e){}

    DB.saveS(newUser); setUser(newUser);
    setBlocked("pending");
    setStep("blocked");
    showToast({msg:"Account created! Waiting for admin approval.",type:"info"});
    setLoad(false);
  };

  // ── Resend OTP ────────────────────────────────────────────
  const resendOtp = () => {
    setOtp(["","","","","",""]);
    window._confirmationResult = null;
    if(window._recaptchaVerifier){ window._recaptchaVerifier.clear(); window._recaptchaVerifier=null; }
    setStep("phone");
    setTimeout(sendOtp, 100);
  };

  // ── OTP box input handler ─────────────────────────────────
  const handleOtp = (i,v) => {
    if(!/^[0-9]?$/.test(v)) return;
    const next=[...otp]; next[i]=v; setOtp(next);
    if(v && i<5) refs[i+1].current?.focus();
    if(!v && i>0) refs[i-1].current?.focus();
  };
  const handleOtpKey=(i,e)=>{
    if(e.key==="Backspace"&&!otp[i]&&i>0) refs[i-1].current?.focus();
    if(e.key==="Enter" && otp.join("").length===6) verifyOtp();
  };

  const DI = {background:"rgba(255,255,255,.08)",border:"1.5px solid rgba(255,255,255,.15)",color:"#fff"};

  return <div className="fullpage" style={{background:"linear-gradient(165deg,#0c0c18 0%,#160828 55%,#08101e 100%)"}}>
    {/* Background glows */}
    <div style={{position:"fixed",top:"12%",left:"25%",width:200,height:200,borderRadius:"50%",
      background:"radial-gradient(circle,rgba(245,158,11,.2),transparent)",filter:"blur(50px)",pointerEvents:"none"}}/>
    <div style={{position:"fixed",bottom:"20%",right:"8%",width:150,height:150,borderRadius:"50%",
      background:"radial-gradient(circle,rgba(14,165,233,.18),transparent)",filter:"blur(38px)",pointerEvents:"none"}}/>

    {/* Brand */}
    <div style={{textAlign:"center",padding:"38px 20px 24px",position:"relative",zIndex:1}}>
      <div style={{width:76,height:76,borderRadius:24,background:"linear-gradient(135deg,#f59e0b,#0ea5e9)",
        display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,margin:"0 auto 16px",
        animation:"glow 3s ease-in-out infinite"}}>📚</div>
      <h1 style={{fontSize:34,fontWeight:900,color:"#fff",letterSpacing:"-1px"}}>
        TEST <span style={{background:"linear-gradient(90deg,#f59e0b,#38bdf8)",
          WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>11</span>
      </h1>
      <p style={{color:"rgba(255,255,255,.45)",fontSize:13,marginTop:6}}>TNPSC AI Exam Preparation</p>
    </div>

    {/* ── PHONE STEP ── */}
    {step==="phone"&&<div style={{flex:1,padding:"0 18px 36px",position:"relative",zIndex:1}}>
      <div style={{background:"rgba(255,255,255,.05)",backdropFilter:"blur(20px)",
        border:"1px solid rgba(255,255,255,.1)",borderRadius:24,padding:24}}>

        <p style={{fontWeight:800,fontSize:17,color:"#fff",marginBottom:4}}>Enter Mobile Number</p>
        <p style={{fontSize:12,color:"rgba(255,255,255,.4)",marginBottom:20}}>
          {window._firebase
            ? "We'll send a real OTP via SMS to your number"
            : "Firebase not configured — demo OTP will be used"}
        </p>

        {/* Phone input */}
        <div style={{display:"flex",gap:10,marginBottom:20}}>
          <div style={{display:"flex",alignItems:"center",padding:"0 14px",
            background:"rgba(255,255,255,.08)",borderRadius:12,
            border:"1px solid rgba(255,255,255,.15)",color:"rgba(255,255,255,.7)",
            fontWeight:700,fontSize:15,flexShrink:0,height:52}}>+91</div>
          <input className="inp" type="tel" inputMode="numeric" maxLength={10}
            value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/g,""))}
            placeholder="9876543210"
            style={{...DI,fontSize:18,letterSpacing:"2px",height:52,flex:1}}
            onKeyDown={e=>e.key==="Enter"&&phone.length===10&&sendOtp()}/>
        </div>

        <button className="btn btn-p" onClick={sendOtp} disabled={loading||phone.length!==10}
          style={{background:"linear-gradient(135deg,#f59e0b,#fbbf24)",color:"#000"}}>
          {loading
            ?<><div style={{width:16,height:16,borderRadius:"50%",border:"2.5px solid rgba(0,0,0,.2)",
                borderTopColor:"#000",animation:"spin 1s linear infinite"}}/>&nbsp;Sending OTP...</>
            :"Send OTP via SMS →"}
        </button>

        {/* Firebase status badge */}
        <div style={{marginTop:14,padding:"10px 14px",borderRadius:12,
          background:window._firebase?"rgba(16,185,129,.08)":"rgba(245,158,11,.08)",
          border:`1px solid ${window._firebase?"rgba(16,185,129,.25)":"rgba(245,158,11,.25)"}`}}>
          {window._firebase
            ?<p style={{fontSize:12,color:"rgba(16,185,129,.9)",fontWeight:600}}>
                ✅ Firebase connected — Real SMS OTP will be sent
              </p>
            :<>
              <p style={{fontSize:12,color:"rgba(245,158,11,.9)",fontWeight:600,marginBottom:3}}>
                ⚠️ Demo Mode (Firebase not configured)
              </p>
              <p style={{fontSize:11,color:"rgba(245,158,11,.7)"}}>
                OTP: <strong>001234</strong> · Admin: <strong>{ADMIN_PHONE}</strong>
              </p>
              <p style={{fontSize:11,color:"rgba(255,255,255,.35)",marginTop:4}}>
                To enable real SMS: add Firebase config in the HTML file
              </p>
            </>
          }
        </div>

        {/* Demo admin shortcut */}
        <div style={{display:"flex",gap:8,marginTop:14}}>
          <button onClick={()=>demoLogin("student")} style={{flex:1,padding:"10px",borderRadius:11,
            background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",
            color:"rgba(255,255,255,.6)",fontSize:12,fontWeight:700,cursor:"pointer"}}>
            🎓 Demo Student
          </button>
          <button onClick={()=>demoLogin("admin")} style={{flex:1,padding:"10px",borderRadius:11,
            background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",
            color:"rgba(255,255,255,.6)",fontSize:12,fontWeight:700,cursor:"pointer"}}>
            👑 Demo Admin
          </button>
        </div>
      </div>
    </div>}

    {/* ── OTP STEP ── */}
    {step==="otp"&&<div style={{flex:1,padding:"0 18px 36px",position:"relative",zIndex:1}}>
      <div style={{background:"rgba(255,255,255,.05)",backdropFilter:"blur(20px)",
        border:"1px solid rgba(255,255,255,.1)",borderRadius:24,padding:24}}>

        <button onClick={()=>{setStep("phone");setOtp(["","","","","",""]);}}
          style={{color:"rgba(255,255,255,.45)",fontSize:13,marginBottom:16,
            display:"flex",alignItems:"center",gap:6,fontWeight:600,background:"none",border:"none",cursor:"pointer"}}>
          ← Back
        </button>

        <p style={{fontWeight:800,fontSize:17,color:"#fff",marginBottom:4}}>Verify OTP</p>
        <p style={{fontSize:13,color:"rgba(255,255,255,.5)",marginBottom:2}}>
          Sent to <strong style={{color:"#fff"}}>+91 {phone}</strong>
        </p>
        {otpMode==="demo"
          ?<p style={{fontSize:12,color:"rgba(245,158,11,.8)",marginBottom:4,fontWeight:600}}>
            Demo OTP: enter <strong>001234</strong>
          </p>
          :<p style={{fontSize:12,color:"rgba(16,185,129,.8)",marginBottom:4,fontWeight:600}}>
            ✅ Real SMS sent via Firebase
          </p>
        }

        {/* 6-digit OTP boxes */}
        <div style={{display:"flex",gap:8,justifyContent:"center",margin:"20px 0"}}>
          {otp.map((v,i)=>(
            <input key={i} ref={refs[i]}
              type="tel" inputMode="numeric" maxLength={1} value={v}
              onChange={e=>handleOtp(i,e.target.value)}
              onKeyDown={e=>handleOtpKey(i,e)}
              style={{
                width:46,height:56,borderRadius:12,
                border:`2px solid ${v?"#f59e0b":"rgba(255,255,255,.15)"}`,
                background:v?"rgba(245,158,11,.1)":"rgba(255,255,255,.07)",
                color:"#fff",fontSize:24,fontWeight:900,textAlign:"center",
                fontFamily:"'DM Mono',monospace",outline:"none",
                transition:"all .2s",
                boxShadow:v?"0 0 0 3px rgba(245,158,11,.15)":"none",
              }}
            />
          ))}
        </div>

        <button className="btn btn-p" onClick={verifyOtp}
          disabled={loading||otp.join("").length!==6}
          style={{background:"linear-gradient(135deg,#f59e0b,#fbbf24)",color:"#000"}}>
          {loading
            ?<><div style={{width:16,height:16,borderRadius:"50%",border:"2.5px solid rgba(0,0,0,.2)",
                borderTopColor:"#000",animation:"spin 1s linear infinite"}}/>&nbsp;Verifying...</>
            :"Verify & Continue ✓"}
        </button>

        {/* Resend */}
        <div style={{textAlign:"center",marginTop:16}}>
          {timer>0
            ?<p style={{fontSize:13,color:"rgba(255,255,255,.35)"}}>
                Resend OTP in <strong style={{color:"rgba(255,255,255,.6)"}}>{timer}s</strong>
              </p>
            :<button onClick={resendOtp}
                style={{fontSize:13,color:"#f59e0b",fontWeight:700,background:"none",border:"none",cursor:"pointer"}}>
                🔄 Resend OTP
              </button>
          }
        </div>
      </div>
    </div>}

    {/* ── REGISTER STEP ── */}
    {step==="register"&&<div style={{flex:1,padding:"0 18px 36px",position:"relative",zIndex:1}}>
      <div style={{background:"rgba(255,255,255,.05)",backdropFilter:"blur(20px)",
        border:"1px solid rgba(255,255,255,.1)",borderRadius:24,padding:24}}>

        <button onClick={()=>setStep("phone")}
          style={{color:"rgba(255,255,255,.45)",fontSize:13,marginBottom:16,
            display:"flex",alignItems:"center",gap:6,fontWeight:600,background:"none",border:"none",cursor:"pointer"}}>
          ← Back
        </button>

        <p style={{fontWeight:800,fontSize:17,color:"#fff",marginBottom:4}}>Create Account</p>
        <p style={{fontSize:12,color:"rgba(255,255,255,.4)",marginBottom:20}}>
          ✅ Verified: +91 {phone}
        </p>

        <div className="ig">
          <label style={{color:"rgba(255,255,255,.5)"}}>FULL NAME *</label>
          <div className="iw">
            <span className="iico">👤</span>
            <input className="inp ipl" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}
              placeholder="Your full name" style={DI}/>
          </div>
        </div>

        <div className="ig">
          <label style={{color:"rgba(255,255,255,.5)"}}>EMAIL (OPTIONAL)</label>
          <div className="iw">
            <span className="iico">✉️</span>
            <input className="inp ipl" type="email" value={form.email}
              onChange={e=>setForm({...form,email:e.target.value})}
              placeholder="you@gmail.com" style={DI}/>
          </div>
        </div>

        <div style={{padding:"12px 14px",borderRadius:12,
          background:"rgba(14,165,233,.08)",border:"1px solid rgba(14,165,233,.2)",marginBottom:18}}>
          <p style={{fontSize:12,color:"rgba(14,165,233,.85)"}}>
            ⏳ Your account needs admin approval before you can access tests.
            You'll be notified once approved.
          </p>
        </div>

        <button className="btn btn-p" onClick={register} disabled={loading}
          style={{background:"linear-gradient(135deg,#f59e0b,#fbbf24)",color:"#000"}}>
          {loading
            ?<><div style={{width:16,height:16,borderRadius:"50%",border:"2.5px solid rgba(0,0,0,.2)",
                borderTopColor:"#000",animation:"spin 1s linear infinite"}}/>&nbsp;Creating...</>
            :"Create Account →"}
        </button>
      </div>
    </div>}

    {/* ── BLOCKED STEP ── */}
    {step==="blocked"&&<div style={{flex:1,padding:"0 18px 36px",position:"relative",zIndex:1,display:"flex",alignItems:"center"}}>
      <div style={{width:"100%",textAlign:"center",padding:"30px 20px",borderRadius:24,
        background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.1)"}}>
        <div style={{fontSize:56,marginBottom:16}}>
          {blocked==="banned"?"🚫":blocked==="suspended"?"⛔":"⏳"}
        </div>
        <h2 style={{fontWeight:800,fontSize:20,color:"#fff",marginBottom:10}}>
          {blocked==="banned"   ?"Account Banned"
          :blocked==="suspended"?"Account Suspended"
          :"Pending Admin Approval"}
        </h2>
        <p style={{fontSize:13,color:"rgba(255,255,255,.45)",marginBottom:6}}>
          {blocked==="banned"   ?"Your account has been permanently banned."
          :blocked==="suspended"?"Your account is temporarily suspended."
          :"Admin will review and approve your account soon."}
        </p>
        <p style={{fontSize:12,color:"rgba(14,165,233,.7)",marginBottom:24}}>
          Contact: <strong>+91 {ADMIN_PHONE}</strong>
        </p>
        <button className="btn btn-p"
          style={{maxWidth:260,margin:"0 auto",background:"rgba(255,255,255,.1)",color:"#fff",border:"1px solid rgba(255,255,255,.2)"}}
          onClick={()=>{DB.clearS();setStep("phone");setPhone("");setOtp(["","","","","",""]);setBlocked("");}}>
          ← Back to Login
        </button>
      </div>
    </div>}
  </div>;
}

    return {
      total:results.length,
      avg:  Math.round(results.reduce((a,b)=>a+b.score,0)/results.length),
      acc:  Math.round(results.reduce((a,b)=>a+b.acc,0)/results.length),

  return <>
    <TopNav title="TEST 11"/>

        <p style={{fontSize:12,color:"var(--mu)",marginBottom:4}}>

        {[{l:"Avg Score",v:`${stats.avg}%`,c:"var(--ac)",i:"⭐"},

          {l:"Tests Done",v:stats.total,     c:"var(--a3)",i:"📝"},
          {l:"Streak",    v:"🔥 "+Math.min(stats.total,7),c:"var(--or)",i:""}].map(s=>(
          <div key={s.l} className="sb">

      <div className="stitle"><span>📋</span><span>Available Tests</span></div>

function ExamPage() {
  const {aTest,nav,setResult,user} = useApp();
  const [started,  setStarted] = useState(false);
  const [cur,      setCur]     = useState(0);
  const [ans,      setAns]     = useState({});
  const [marked,   setMarked]  = useState(new Set());
  const [time,     setTime]    = useState(0);
  const [warn,     setWarn]    = useState(false);
  const [warnDone, setWarnD]   = useState(false);
  const [palette,  setPalette] = useState(false);
  const [confirm,  setConfirm] = useState(false);
  const timerRef = useRef(null);

  const test = aTest;
  const qs   = test?.qs || [];
  const N    = qs.length;

  useEffect(()=>{ if(test) setTime(test.dur*60); },[test]);

  const submit = useCallback(()=>{
    clearInterval(timerRef.current);
    let c=0,w=0,s=0; const tm={};
    qs.forEach((q,i)=>{
      if(!tm[q.topic]) tm[q.topic]={c:0,t:0};
      tm[q.topic].t++;
      if(ans[i]===undefined)      s++;
      else if(ans[i]===q.ans){ c++; tm[q.topic].c++; }
      else                        w++;
    });
    const score = Math.round((c/N)*100);
    const acc   = Math.round((c/Math.max(c+w,1))*100);
    const wt    = Object.entries(tm).map(([name,d])=>({name,correct:d.c,total:d.t,acc:Math.round((d.c/d.t)*100)}));
    const res   = {
      uid:user?.id, testId:test.id, testName:test.name,
      date:new Date().toISOString(), totalQ:N, ans,
      timeTaken:(test.dur*60)-time,
      correct:c, wrong:w, skipped:s, score, acc, wt
    };
    setResult(res);
    const all=DB.results(); all.push(res); DB.saveR(all);

    // Save wrong answers for practice mode
    const wrongQs = qs.filter((_,i)=>{
      const a = ans[i];
      if(a===undefined||a===null||a==='') return false;
      return parseInt(a)!==qs[i].ans;
    });
    if(wrongQs.length>0){
      const existing = JSON.parse(localStorage.getItem('e11_wrong_qs')||'[]');
      const merged   = [...wrongQs,...existing].slice(0,200);
      localStorage.setItem('e11_wrong_qs', JSON.stringify(merged));
    }

    nav("result");
  },[ans,qs,N,test,time,user]);

  useEffect(()=>{
    if(!started) return;
    timerRef.current = setInterval(()=>{
      setTime(p=>{
        if(p<=1){ clearInterval(timerRef.current); submit(); return 0; }
        if(p===300&&!warnDone){ setWarn(true); setWarnD(true); }
        return p-1;
      });
    },1000);
    return()=>clearInterval(timerRef.current);
  },[started,submit,warnDone]);

  const fmt = s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const done = Object.keys(ans).length;
  const crit = time<300;
  const qSt  = i=>{
    if(marked.has(i)&&ans[i]!==undefined) return "p3";
    if(marked.has(i))                     return "p2";
    if(ans[i]!==undefined)                return "p1";
    if(i<cur)                             return "p4";
    return "p0";
  };

  if(!test) return <div style={{textAlign:"center",padding:"60px 20px"}}>
    <p style={{color:"var(--mu)"}}>No test selected</p>
    <button className="btn btn-s" style={{maxWidth:200,margin:"20px auto 0"}} onClick={()=>nav("tests")}>Go to Tests</button>
  </div>;

  const q  = qs[cur];
  const isTamil = q?.lang==="ta";

  if(!started) return (
    <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{textAlign:"center",marginBottom:24}}>
        <div style={{fontSize:48,marginBottom:12}}>📝</div>
        <h2 style={{fontSize:20,fontWeight:800,marginBottom:4}}>{test.name}</h2>
        <p style={{color:"var(--mu)",fontSize:14}}>{test.subject}</p>
        {/* question language badge */}
        <div style={{display:"inline-flex",alignItems:"center",gap:6,marginTop:10,padding:"5px 14px",borderRadius:20,background:"rgba(139,92,246,.15)",border:"1px solid rgba(139,92,246,.3)"}}>
          <span style={{fontSize:13,fontWeight:700,color:"var(--a2)"}}>
            Questions: {test.qs?.[0]?.lang==="ta"?"Tamil 🇮🇳":"English 🇬🇧"}
          </span>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,width:"100%",maxWidth:380,marginBottom:22}}>
        {[{i:"❓",l:"Questions",v:N},{i:"⏱",l:"Duration",v:`${test.dur}m`},{i:"🏆",l:"Marking",v:"+1 / 0"}].map(s=>(
          <div key={s.l} style={{padding:14,borderRadius:14,background:"var(--sf)",border:"1px solid var(--bd)",textAlign:"center"}}>
            <div style={{fontSize:20,marginBottom:4}}>{s.i}</div>
            <div style={{fontWeight:800,fontSize:14}}>{s.v}</div>
            <div style={{fontSize:10,color:"var(--mu)"}}>{s.l}</div>
          </div>
        ))}
      </div>
      <div style={{width:"100%",maxWidth:380,background:"var(--s2)",borderRadius:14,padding:14,marginBottom:22}}>
        {["1 mark per question","No negative marking","Auto-submits when timer ends","Use palette to navigate questions"].map((l,i)=>(
          <p key={i} style={{fontSize:12,color:"var(--mu)",marginBottom:4}}>• {l}</p>
        ))}
      </div>
      <div style={{display:"flex",gap:10,width:"100%",maxWidth:380}}>
        <button className="btn btn-s" style={{flex:"0 0 auto",width:"auto",padding:"14px 20px"}} onClick={()=>nav("tests")}>←</button>
        <button className="btn btn-p" style={{flex:1,fontSize:16}} onClick={()=>setStarted(true)}>🚀 Begin Test</button>
      </div>
    </div>
  );

  return (
    <div className="exampage">
      {/* Exam top bar */}
      <div style={{background:"var(--sf)",borderBottom:"1px solid var(--bd)",padding:"10px 12px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <div style={{flex:1,minWidth:0}}>
          <p style={{fontWeight:700,fontSize:13,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{test.name}</p>
          <p style={{fontSize:11,color:"var(--mu)"}}>Q {cur+1} / {N}</p>
        </div>
        <div style={{fontFamily:"monospace",fontWeight:900,fontSize:19,padding:"6px 12px",borderRadius:11,
          background:crit?"rgba(239,68,68,.15)":"var(--s2)",color:crit?"#ef4444":"var(--tx)",
          border:`1px solid ${crit?"rgba(239,68,68,.4)":"var(--bd)"}`,flexShrink:0,
          animation:crit?"pulse 1s infinite":undefined}}>
          ⏱ {fmt(time)}
        </div>
        <button onClick={()=>setPalette(true)} style={{width:34,height:34,borderRadius:9,background:"var(--s2)",border:"1px solid var(--bd)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>🔲</button>
      </div>

      {/* Progress bar */}
      <div style={{height:3,background:"var(--s2)",flexShrink:0}}>
        <div style={{height:"100%",background:"linear-gradient(90deg,var(--ac),var(--a2))",width:`${(done/N)*100}%`,transition:"width .3s"}}/>
      </div>

      {/* Question scroll area */}
      <div style={{flex:1,overflowY:"auto",padding:14,WebkitOverflowScrolling:"touch"}}>
        {q&&<>
          <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
            <span className={`badge b-${q.diff?.toLowerCase()||"medium"}`}>{q.diff}</span>
            <span className="badge" style={{background:"rgba(14,165,233,.1)",color:"var(--a3)",border:"1px solid rgba(14,165,233,.2)"}}>{q.topic}</span>
            {isTamil&&<span className="badge" style={{background:"rgba(109,40,217,.1)",color:"var(--a2)",border:"1px solid rgba(109,40,217,.2)"}}>🇮🇳 Tamil</span>}
          </div>
          <div className="card cp" style={{marginBottom:14}}>
            <p style={{fontSize:16,fontWeight:600,lineHeight:1.7}} className={isTamil?"ta":""}>{q.q}</p>
          </div>
          {q.opts.map((op,i)=>(
            <button key={i} className={`opt${ans[cur]===i?" sel":""}`} onClick={()=>setAns({...ans,[cur]:i})}>
              <div className="opt-lt" style={{background:ans[cur]===i?"var(--ac)":"var(--s2)",color:ans[cur]===i?"#fff":"var(--mu)"}}>
                {String.fromCharCode(65+i)}
              </div>
              <span style={{fontSize:14,flex:1,textAlign:"left",lineHeight:1.5}} className={isTamil?"ta":""}>{op}</span>
            </button>
          ))}
        </>}
      </div>

      {/* Bottom controls */}
      <div style={{background:"var(--sf)",borderTop:"1px solid var(--bd)",padding:"10px 12px",flexShrink:0}}>
        <div style={{display:"flex",gap:8,marginBottom:8}}>
          <button className="btn btn-s btn-sm" style={{flex:1}} onClick={()=>setCur(Math.max(0,cur-1))} disabled={cur===0}>← Prev</button>
          <button className={`btn btn-sm ${marked.has(cur)?"btn-o":"btn-s"}`} style={{width:"auto",padding:"9px 12px"}}
            onClick={()=>{const m=new Set(marked);m.has(cur)?m.delete(cur):m.add(cur);setMarked(m);}}>
            🚩 Mark
          </button>
          <button className="btn btn-s btn-sm" style={{flex:1}} onClick={()=>cur<N-1?setCur(cur+1):setConfirm(true)}>
            {cur<N-1?"Next →":"Submit ✓"}
          </button>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",fontSize:12,color:"var(--mu)"}}>
          <span>✅<strong style={{color:"var(--gn)"}}>{done}</strong> ❌<strong style={{color:"var(--rd)"}}>{N-done}</strong> 🚩<strong style={{color:"var(--or)"}}>{marked.size}</strong></span>
          <button className="btn btn-g btn-xs" onClick={()=>setConfirm(true)}>Submit ✓</button>
        </div>
      </div>

      {/* Palette */}
      {palette&&<div className="overlay" onClick={()=>setPalette(false)}>
        <div className="sheet" onClick={e=>e.stopPropagation()}>
          <div className="pill"/>
          <p style={{fontWeight:800,marginBottom:12}}>Question Palette</p>
          <div className="pal">
            {qs.map((_,i)=>(
              <button key={i} className={`pb p${qSt(i).slice(1)}`}
                style={{outline:i===cur?"2px solid var(--a2)":"none",outlineOffset:2}}
                onClick={()=>{setCur(i);setPalette(false);}}>
                {i+1}
              </button>
            ))}
          </div>
          <div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:12,fontSize:11}}>
            {[{c:"var(--gn)",l:"Answered"},{c:"var(--or)",l:"Marked"},{c:"var(--ac)",l:"Mark+Ans"},{c:"var(--s2)",l:"Not visited"}].map(x=>(
              <div key={x.l} style={{display:"flex",alignItems:"center",gap:4}}>
                <div style={{width:10,height:10,borderRadius:2,background:x.c}}/>
                <span style={{color:"var(--mu)"}}>{x.l}</span>
              </div>
            ))}
          </div>
          <button className="btn btn-s" style={{marginTop:16}} onClick={()=>setPalette(false)}>Close</button>
        </div>
      </div>}

      {/* 5-min warning */}
      {warn&&<div className="overlay"><div className="sheet" style={{textAlign:"center"}}>
        <div className="pill"/>
        <div style={{fontSize:44,marginBottom:10}}>⚠️</div>
        <h3 style={{fontWeight:800,fontSize:18,marginBottom:8}}>5 Minutes Remaining!</h3>
        <p style={{color:"var(--mu)",fontSize:14,marginBottom:20}}>Please review your answers and submit soon.</p>
        <button className="btn btn-p" onClick={()=>setWarn(false)}>Continue</button>
      </div></div>}

      {/* Confirm submit */}
      {confirm&&<div className="overlay"><div className="sheet">
        <div className="pill"/>
        <h3 style={{fontWeight:800,fontSize:17,marginBottom:16}}>Submit Test?</h3>
        {[{l:"Total Questions",v:N},{l:"Answered",v:done,c:"var(--gn)"},{l:"Unanswered",v:N-done,c:"var(--rd)"},{l:"Marked",v:marked.size,c:"var(--or)"}].map(s=>(
          <div key={s.l} style={{display:"flex",justifyContent:"space-between",padding:"10px 12px",borderRadius:10,background:"var(--s2)",marginBottom:8}}>
            <span style={{fontSize:14,color:"var(--mu)"}}>{s.l}</span>
            <strong style={{color:s.c||"var(--tx)"}}>{s.v}</strong>
          </div>
        ))}
        <div style={{display:"flex",gap:8,marginTop:14}}>
          <button className="btn btn-s" style={{flex:1}} onClick={()=>setConfirm(false)}>Cancel</button>
          <button className="btn btn-g" style={{flex:1}} onClick={submit}>Submit ✓</button>
        </div>
      </div></div>}
    </div>
  );
}
