// RESULT PAGE
// ═══════════════════════════════════════
function ResultPage() {
  const {result,aTest,nav,showToast} = useApp();
  const [tab,setTab] = useState("summary");
  if(!result) return <div style={{textAlign:"center",padding:"60px 20px"}}>
    <p style={{color:"var(--mu)",marginBottom:16}}>No result to show</p>
    <button className="btn btn-s" style={{maxWidth:200,margin:"0 auto"}} onClick={()=>nav("home")}>Go Home</button>
  </div>;

  const {correct,wrong,skipped,score,acc,totalQ,wt,timeTaken,testName,ans} = result;
  const test = aTest;
  const qs   = test?.qs || [];
  const fmt  = s=>`${Math.floor(s/60)}m ${s%60}s`;
  const pc   = a=>a>=70?"var(--gn)":a>=50?"var(--yw)":"var(--rd)";
  const grade= score>=90?"Excellent 🏆":score>=75?"Very Good 🌟":score>=60?"Good 👍":score>=40?"Average 📈":"Keep Trying 💪";
  const gcol = score>=75?"var(--gn)":score>=50?"var(--a2)":"var(--rd)";

  const share = () => {
    const txt=`📚 EXAM 11 Result\n📝 ${testName}\n⭐ Score: ${score}%\n🎯 Accuracy: ${acc}%\n✅ ${correct}/${totalQ} correct\n\nPrepare smarter with EXAM 11!`;
    if(navigator.share) navigator.share({title:"My Result",text:txt});
    else { navigator.clipboard?.writeText(txt); showToast({msg:"Result copied!",type:"success"}); }
  };

  return <>
    <TopNav title="Result" back onBack={()=>nav("results")}/>
    <div className="page" style={{paddingTop:"calc(var(--nh)+10px)"}}>
      <div style={{textAlign:"center",padding:"16px 0 14px"}}>
        <div style={{fontSize:44,marginBottom:8}}>🏁</div>
        <h2 style={{fontSize:20,fontWeight:800,marginBottom:4}}>Test Complete!</h2>
        <p style={{color:"var(--mu)",fontSize:13,marginBottom:10}}>{testName}</p>
        <span style={{padding:"5px 16px",borderRadius:20,fontSize:13,fontWeight:700,background:`${gcol}20`,color:gcol,border:`1px solid ${gcol}40`}}>{grade}</span>
      </div>

      {/* Score row */}
      <div className="sg">
        {[{l:"Score",v:`${score}%`,c:"var(--ac)"},{l:"Correct",v:correct,c:"var(--gn)"},
          {l:"Wrong",v:wrong,c:"var(--rd)"},{l:"Skipped",v:skipped,c:"var(--or)"}].map(s=>(
          <div key={s.l} className="sb">
            <div style={{fontSize:22,fontWeight:900,color:s.c}}>{s.v}</div>
            <div style={{fontSize:11,color:"var(--mu)",marginTop:2}}>{s.l}</div>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{display:"flex",background:"var(--s2)",borderRadius:13,padding:4,marginBottom:14,border:"1px solid var(--bd)"}}>
        {[{k:"summary",l:"Summary"},{k:"analysis",l:"Analysis"},{k:"answers",l:"Answers"}].map(tb=>(
          <button key={tb.k} onClick={()=>setTab(tb.k)} style={{flex:1,padding:"8px 4px",borderRadius:10,fontSize:13,fontWeight:700,cursor:"pointer",
            background:tab===tb.k?"var(--sf)":"transparent",color:tab===tb.k?"var(--a2)":"var(--mu)",border:"none",transition:"all .2s"}}>
            {tb.l}
          </button>
        ))}
      </div>

      {tab==="summary"&&<>
        <div className="card cp" style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-around"}}>
            <div style={{textAlign:"center"}}><Donut pct={score} color="var(--ac)"/><p style={{fontSize:11,color:"var(--mu)",marginTop:4}}>Score</p></div>
            <div style={{textAlign:"center"}}><Donut pct={acc} color="var(--gn)"/><p style={{fontSize:11,color:"var(--mu)",marginTop:4}}>Accuracy</p></div>
          </div>
        </div>
        <div className="card cp" style={{marginBottom:14}}>
          {[{l:"Total Questions",v:totalQ},{l:"Correct",v:correct,c:"var(--gn)"},{l:"Wrong",v:wrong,c:"var(--rd)"},
            {l:"Skipped",v:skipped,c:"var(--or)"},{l:"Accuracy",v:`${acc}%`,c:"var(--a2)"},{l:"Time Taken",v:fmt(timeTaken||0)}].map(d=>(
            <div key={d.l} style={{display:"flex",justifyContent:"space-between",padding:"9px 0",borderBottom:"1px solid var(--bd)"}}>
              <span style={{fontSize:14,color:"var(--mu)"}}>{d.l}</span>
              <strong style={{color:d.c||"var(--tx)"}}>{d.v}</strong>
            </div>
          ))}
        </div>
      </>}

      {tab==="analysis"&&<div className="card cp" style={{marginBottom:14}}>
        <p style={{fontWeight:700,marginBottom:14}}>Topic Analysis</p>
        {(wt||[]).sort((a,b)=>a.acc-b.acc).map(tp=>(
          <div key={tp.name} style={{marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:5,fontSize:13}}>
              <span style={{fontWeight:600}}>{tp.name}</span>
              <div style={{display:"flex",gap:8}}>
                <span style={{color:"var(--mu)"}}>{tp.correct}/{tp.total}</span>
                <span style={{fontWeight:700,color:pc(tp.acc)}}>{tp.acc}%</span>
              </div>
            </div>
            <div className="pbar"><div className="pfill" style={{width:`${tp.acc}%`,background:pc(tp.acc)}}/></div>
          </div>
        ))}
        {(wt||[]).filter(t=>t.acc<50).length>0&&<div style={{marginTop:14,padding:"12px 14px",borderRadius:12,background:"rgba(109,40,217,.08)",border:"1px solid rgba(109,40,217,.2)"}}>
          <p style={{fontSize:12,fontWeight:700,color:"var(--a2)",marginBottom:4}}>💡 Recommendation</p>
          <p style={{fontSize:13,color:"var(--mu)"}}>Focus on: <strong style={{color:"var(--tx)"}}>{(wt||[]).filter(t=>t.acc<50).map(t=>t.name).join(", ")}</strong></p>
        </div>}
      </div>}

      {tab==="answers"&&<div style={{marginBottom:14}}>
        {qs.map((q,i)=>{
          const uAns=ans?.[i],ok=uAns===q.ans,skip=uAns===undefined;
          const isTamil=q.lang==="ta";
          return <div key={i} className="card" style={{marginBottom:10,borderColor:skip?"var(--bd)":ok?"rgba(16,185,129,.4)":"rgba(239,68,68,.4)"}}>
            <div className="cp">
              <div style={{display:"flex",gap:8,marginBottom:10,alignItems:"center"}}>
                <div style={{width:26,height:26,borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:12,
                  background:skip?"var(--s2)":ok?"rgba(16,185,129,.2)":"rgba(239,68,68,.2)",
                  color:skip?"var(--mu)":ok?"var(--gn)":"var(--rd)"}}>
                  {skip?"—":ok?"✓":"✗"}
                </div>
                <span className={`badge b-${q.diff?.toLowerCase()||"medium"}`}>{q.diff}</span>
                <span style={{fontSize:12,color:"var(--mu)",marginLeft:"auto"}}>{q.topic}</span>
              </div>
              <p style={{fontSize:13,fontWeight:500,marginBottom:10,lineHeight:1.6}} className={isTamil?"ta":""}>{i+1}. {q.q}</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                {q.opts.map((op,j)=>(
                  <div key={j} style={{padding:"7px 10px",borderRadius:8,fontSize:12,
                    background:j===q.ans?"rgba(16,185,129,.1)":j===uAns&&!ok?"rgba(239,68,68,.1)":"var(--s2)",
                    border:`1px solid ${j===q.ans?"rgba(16,185,129,.3)":j===uAns&&!ok?"rgba(239,68,68,.3)":"var(--bd)"}`}}
                    className={isTamil?"ta":""}>
                    {String.fromCharCode(65+j)}. {op}
                  </div>
                ))}
              </div>
            </div>
            {q.exp&&<div style={{padding:"10px 14px",borderTop:"1px solid var(--bd)",background:"rgba(109,40,217,.04)"}}>
              <span style={{fontSize:12,fontWeight:700,color:"var(--a2)"}}>💡 </span>
              <span style={{fontSize:12,color:"var(--mu)"}} className={isTamil?"ta":""}>{q.exp}</span>
            </div>}
          </div>;
        })}
      </div>}

      <div style={{display:"flex",gap:8,paddingBottom:20}}>
        <button className="btn btn-s btn-sm" style={{flex:1}} onClick={()=>nav("home")}>🏠 Home</button>
        <button className="btn btn-s btn-sm" style={{width:"auto",padding:"9px 14px"}} onClick={share}>📤 Share</button>
        <button className="btn btn-p btn-sm" style={{flex:1}} onClick={()=>nav("exam")}>🔁 Retake</button>
      </div>
    </div>
  </>;
}

// RESULTS LIST
// ═══════════════════════════════════════
function ResultsPage() {
  const {user,nav,setResult,setATest} = useApp();
  const allRes  = DB.results().filter(r=>r.uid===user?.id).reverse();
  const allTests= DB.tests();
  return <>
    <TopNav title="My Results"/>
    <div className="page">
      {allRes.length===0
        ?<div style={{textAlign:"center",padding:"50px 20px"}}>
          <div style={{fontSize:48,marginBottom:12}}>📊</div>
          <p style={{fontWeight:700,marginBottom:6}}>No results yet</p>
          <p style={{fontSize:13,color:"var(--mu)",marginBottom:20}}>Take a test to see your results here</p>
          <button className="btn btn-p" style={{maxWidth:240,margin:"0 auto"}} onClick={()=>nav("tests")}>Browse Tests</button>
        </div>
        :allRes.map((r,i)=>{
          const test=allTests.find(t=>t.id===r.testId);
          return <div key={i} className="card cp" style={{marginBottom:10,cursor:"pointer",transition:"all .2s"}}
            onClick={()=>{setResult(r);if(test)setATest(test);nav("result");}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
              <p style={{fontWeight:700,fontSize:14,flex:1}}>{r.testName}</p>
              <span style={{fontSize:20,fontWeight:900,color:r.score>=60?"var(--gn)":"var(--rd)",marginLeft:10}}>{r.score}%</span>
            </div>
            <div style={{display:"flex",gap:12,fontSize:12,color:"var(--mu)"}}>
              <span>✅ {r.correct}/{r.totalQ}</span>

// ADMIN: PDF UPLOAD + AI MCQ GENERATION
// ═══════════════════════════════════════
function AdminUpload({showToast}) {
  const [file,     setFile]    = useState(null);
  const [drag,     setDrag]    = useState(false);
  const [stage,    setStage]   = useState("upload"); // upload | detect | settings | processing | done
  const [settings, setSettings]= useState({name:"",subject:"General Studies",dur:60,qLang:"en",count:20,mode:"auto"});
  const [steps,    setSteps]   = useState([]);
  const [progress, setProgress]= useState(0);
  const [result,   setResult2] = useState(null);
  const [detected, setDetected]= useState(null); // {hasAnswers, qCount, preview}
  const [inlineKey,setInlineKey]=useState(DB.apiKey()||"");
  const subjects = ["General Studies","History","Polity","Geography","Science","Economics","Tamil Literature","English","Mathematics","Current Affairs"];

  const saveKey = () => {
    if(!inlineKey.trim()){showToast({msg:"Paste your Groq API key first",type:"error"});return;}
    DB.saveKey(inlineKey.trim());
    showToast({msg:"✅ API key saved!",type:"success"});
  };

  // ── SMART PARSER: detect if PDF already has Q&A ──────────────
  function parseExistingQA(text) {
    const lines = text.split(/\n/).map(l => l.trim()).filter(Boolean);
    const questions = [];
    let i = 0;

    while (i < lines.length) {
      const line = lines[i];
      // Match patterns like: "1.", "Q1.", "Q.1", "1)", "(1)"
      const qMatch = line.match(/^(?:Q\.?\s*)?([0-9]+)[.)\]\s]+(.+)/i);

      if (qMatch) {
        const qText = qMatch[2].trim();
        // Skip if too short or is an answer key line
        if (qText.length < 10) { i++; continue; }

        const opts = [];
        let ans = -1;
        let j = i + 1;
        let correctMark = -1;

        // Collect options (A-D or a-d or 1-4)
        while (j < lines.length && opts.length < 4) {
          const optLine = lines[j];
          // Match option patterns: "(A)", "A.", "A)", "(a)", "1.", etc.
          const optMatch = optLine.match(/^[\(\[]?([A-Da-d1-4])[.)\]\s]+(.+)/);
          if (optMatch) {
            const optText = optMatch[2].trim();
            // Check if this option is marked as correct (✓, *, bold, underline indicators)
            const isMarked = optLine.match(/[✓✔*→►]/) || optText.match(/\*$|\(correct\)/i);
            if (isMarked) correctMark = opts.length;
            opts.push(optText.replace(/[✓✔*→►].*$/, '').replace(/\(correct\)/i,'').trim());
            j++;
          } else if (optLine.match(/^[\(\[]?([A-Da-d1-4])[.)\]]/)) {
            // Option letter only line, next line is the text
            const nextLine = lines[j+1];
            if (nextLine && !nextLine.match(/^[0-9]+[.)]/)) {
              opts.push(nextLine.trim());
              j += 2;
            } else break;
          } else {
            break;
          }
        }

        // Look for "Answer:" or "Ans:" line near options
        const answerPatterns = [
          /^(?:answer|ans|correct answer|key)[:\s]+([A-Da-d1-4])/i,
          /^([A-Da-d])[.)\s]*is\s+(?:correct|the answer)/i,
          /^(?:answer|ans)[:\s]*\(([A-Da-d1-4])\)/i,
        ];

        // Check next few lines for answer
        for (let k = j; k < Math.min(j+4, lines.length); k++) {
          for (const pat of answerPatterns) {
            const m = lines[k].match(pat);
            if (m) {
              const letter = m[1].toUpperCase();
              const idx = ['A','B','C','D','1','2','3','4'].indexOf(letter);
              ans = idx >= 4 ? idx - 4 : idx;
              j = k + 1;
              break;
            }
          }
          if (ans >= 0) break;
        }

        // If marked answer found from checkmarks
        if (ans < 0 && correctMark >= 0) ans = correctMark;

        // Only add if we have 4 options
        if (opts.length === 4) {
          questions.push({
            id: Date.now() + questions.length,
            q: qText,
            opts,
            ans: ans >= 0 ? ans : 0,
            hasAnswer: ans >= 0,
            topic: "General",
            chapter: "Section",
            diff: "Medium",
            exp: ans >= 0 ? `Correct answer is option ${String.fromCharCode(65+ans)}: ${opts[ans]}` : "Refer to source material.",
            con: "Study Material",
            lang: "en"
          });
        }
        i = j;
      } else {
        i++;
      }
    }
    return questions;
  }

  // ── DETECT what kind of PDF was uploaded ─────────────────────
  const detectFile = async (f) => {
    setFile(f);
    const name = f.name.replace(/\.[^.]+$/, "");
    setSettings(s=>({...s, name}));

    // Quick text read
    const text = await readFileText(f);

    if (!text || text.trim().length < 50) {
      // Likely scanned PDF - can only use AI
      setDetected({hasAnswers:false, qCount:0, mode:"ai_only",
        preview:"⚠️ Scanned/image PDF detected. AI will generate questions from topic name.",
        text:""});
      setStage("detect");
      return;
    }

    // Try to parse existing Q&A
    const parsed = parseExistingQA(text);
    const withAnswers = parsed.filter(q=>q.hasAnswer).length;

    setDetected({
      hasAnswers: parsed.length > 0,
      qCount: parsed.length,
      answersFound: withAnswers,
      mode: parsed.length >= 3 ? "direct" : "ai",
      preview: text.slice(0,300),
      text,
      parsed: parsed.length >= 3 ? parsed : null
    });
    setStage("detect");
  };

  const handleFile = f => {
    const ok = f.name.match(/\.(pdf|txt|docx)$/i);
    if(!ok){showToast({msg:"Only PDF, TXT, DOCX supported",type:"error"});return;}
    detectFile(f);
  };

  const addStep = (label) => setSteps(s=>[...s,{label}]);

  // ── DIRECT PARSE (PDF already has Q+A) ───────────────────────
  const processDirect = async () => {
    if(!settings.name.trim()){showToast({msg:"Enter a test name",type:"error"});return;}
    setStage("processing"); setSteps([]); setProgress(0);

    addStep("📂 Reading questions from PDF...");
    setProgress(20);
    await new Promise(r=>setTimeout(r,500));

    let qs = detected.parsed;

    // If some answers are missing, use AI to fill them in
    const missing = qs.filter(q=>!q.hasAnswer).length;
    if(missing > 0 && DB.apiKey()) {
      addStep(`🤖 AI filling ${missing} missing answers...`);
      setProgress(50);
      // Use AI only for questions without answers
      const noAns = qs.filter(q=>!q.hasAnswer);
      for(const q of noAns) {
        try {
          const res = await fetch("https://api.groq.com/openai/v1/chat/completions",{
            method:"POST",
            headers:{"Content-Type":"application/json","Authorization":`Bearer ${DB.apiKey()}`},
            body:JSON.stringify({
              model:"llama3-70b-8192", max_tokens:100, temperature:0.1,
              messages:[{role:"user",content:`For this MCQ, which option (0=A,1=B,2=C,3=D) is correct?
Question: ${q.q}
A: ${q.opts[0]}
B: ${q.opts[1]}
C: ${q.opts[2]}
D: ${q.opts[3]}
Reply with ONLY a single digit: 0, 1, 2, or 3`}]
            })
          });
          if(res.ok){
            const d = await res.json();
            const idx = parseInt(d.choices?.[0]?.message?.content?.trim());
            if(idx>=0&&idx<=3){ q.ans=idx; q.exp=`Correct answer: ${q.opts[idx]}`; }
          }
        } catch(e){}
      }
    }

    addStep(`✅ ${qs.length} questions ready`);
    setProgress(90);

    const tagged = qs.map((q,i)=>({...q,id:Date.now()+i,lang:settings.qLang,subject:settings.subject}));
    const bank={id:Date.now().toString(),name:settings.name,subject:settings.subject,
      fileName:file.name,qLang:settings.qLang,count:tagged.length,
      createdAt:new Date().toISOString(),qs:tagged};
    const banks=DB.banks(); banks.push(bank); DB.saveB(banks);

    // Auto-create test
    const test={id:bank.id+"_test",name:settings.name,subject:settings.subject,
      diff:"Mixed",dur:settings.dur,qs:tagged,published:false,
      bankId:bank.id,createdAt:new Date().toISOString()};
    const tests=DB.tests().filter(t=>!t.builtIn); tests.push(test); DB.saveT(tests);

    addStep("🎯 Test created!");
    setProgress(100);
    setResult2({...bank, testId:test.id});
    setStage("done");
  };

  // ── AI GENERATION (PDF has no answers) ───────────────────────
  const processAI = async () => {
    if(!settings.name.trim()){showToast({msg:"Enter a test name",type:"error"});return;}
    const key = DB.apiKey();
    if(!key){showToast({msg:"⚠️ No Groq API key — paste it below first!",type:"error"});return;}
    setStage("processing"); setSteps([]); setProgress(0);

    addStep("📂 Reading file content...");
    setProgress(10);
    const text = detected?.text || await readFileText(file);

    if(!text||text.trim().length<50){
      showToast({msg:"Could not read text from PDF. Try a .txt file.",type:"error"});
      setStage("detect"); return;
    }
    addStep(`📄 Extracted ${text.length.toLocaleString()} characters`);
    setProgress(30);

    addStep("🤖 AI generating questions (free Groq)...");
    setProgress(50);

    const mcqs = await generateMCQs(text, settings.subject, settings.count, settings.qLang, showToast);
    if(!mcqs||!mcqs.length){ setStage("detect"); return; }

    addStep(`✨ ${mcqs.length} questions generated`);
    setProgress(80);

    const tagged = mcqs.map((q,i)=>({...q,id:Date.now()+i,lang:settings.qLang}));
    const bank={id:Date.now().toString(),name:settings.name,subject:settings.subject,
      fileName:file.name,qLang:settings.qLang,count:tagged.length,
      createdAt:new Date().toISOString(),qs:tagged};
    const banks=DB.banks(); banks.push(bank); DB.saveB(banks);

    const test={id:bank.id+"_test",name:settings.name,subject:settings.subject,
      diff:"Mixed",dur:settings.dur,qs:tagged,published:false,
      bankId:bank.id,createdAt:new Date().toISOString()};
    const tests=DB.tests().filter(t=>!t.builtIn); tests.push(test); DB.saveT(tests);

    addStep("🎯 Test created!");
    setProgress(100);
    setResult2({...bank,testId:test.id});
    setStage("done");
  };

  const reset = () => {setStage("upload");setFile(null);setDetected(null);setSteps([]);setProgress(0);setResult2(null);};

  return <>
    {/* Step indicator */}
    <div style={{display:"flex",alignItems:"center",marginBottom:20}}>
      {["Upload","Detect","Settings","Processing","Done"].map((s,i)=>{
        const idx=["upload","detect","settings","processing","done"].indexOf(stage);
        return <React.Fragment key={s}>
          <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
            <div style={{width:22,height:22,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:800,
              background:i===idx?"var(--ac)":idx>i?"var(--gn)":"var(--s2)",
              color:i===idx||idx>i?"#fff":"var(--mu)"}}>
              {idx>i?"✓":i+1}
            </div>
            <span style={{fontSize:10,color:i===idx?"var(--tx)":"var(--mu)",fontWeight:i===idx?700:400}}>{s}</span>
          </div>
          {i<4&&<div style={{flex:1,height:2,margin:"0 4px",background:idx>i?"var(--gn)":"var(--bd)"}}/>}
        </React.Fragment>;
      })}
    </div>

    {/* ── STAGE: UPLOAD ── */}
    {stage==="upload"&&<>
      <div className={`dropzone ${drag?"drag":""}`}
        onDragOver={e=>{e.preventDefault();setDrag(true)}}
        onDragLeave={()=>setDrag(false)}
        onDrop={e=>{e.preventDefault();setDrag(false);handleFile(e.dataTransfer.files[0])}}
        onClick={()=>document.getElementById("fu").click()}>
        <input id="fu" type="file" accept=".pdf,.txt,.docx" style={{display:"none"}} onChange={e=>handleFile(e.target.files[0])}/>
        <div style={{fontSize:52,marginBottom:12}}>📋</div>
        <p style={{fontWeight:800,fontSize:17,marginBottom:6}}>Upload Question Paper</p>
        <p style={{color:"var(--mu)",fontSize:13,marginBottom:16}}>PDF or TXT with MCQ questions</p>
        <div style={{display:"flex",gap:8,justifyContent:"center",marginBottom:18}}>
          {["PDF","TXT","DOCX"].map(f=><span key={f} className="badge" style={{background:"var(--s2)",color:"var(--mu)",border:"1px solid var(--bd)"}}>{f}</span>)}
        </div>
        <button className="btn btn-p" style={{maxWidth:200,margin:"0 auto"}} onClick={e=>e.stopPropagation()}>Choose File</button>
      </div>

      {/* How it works */}
      <div style={{marginTop:16,display:"flex",flexDirection:"column",gap:10}}>
        <p style={{fontSize:13,fontWeight:700,color:"var(--a2)"}}>✨ Two ways it works:</p>
        <div style={{padding:"12px 14px",borderRadius:12,background:"rgba(16,185,129,.08)",border:"1px solid rgba(16,185,129,.25)"}}>
          <p style={{fontWeight:700,fontSize:13,color:"var(--gn)",marginBottom:4}}>📄 PDF with Questions + Answers</p>

        </div>
        <div style={{padding:"12px 14px",borderRadius:12,background:"rgba(139,92,246,.08)",border:"1px solid rgba(139,92,246,.25)"}}>

          <p style={{fontSize:12,color:"var(--mu)"}}>Upload any study material → AI (Groq, free) reads it and generates MCQ questions with answers automatically.</p>
        </div>
      </div>
    </>}

    {/* ── STAGE: DETECT ── */}
    {stage==="detect"&&detected&&<>
      <div style={{padding:"14px 16px",borderRadius:14,marginBottom:16,
        background:detected.qCount>=3?"rgba(16,185,129,.1)":"rgba(14,165,233,.08)",
        border:`1px solid ${detected.qCount>=3?"rgba(16,185,129,.3)":"rgba(14,165,233,.25)"}`}}>
        <p style={{fontWeight:800,fontSize:15,marginBottom:6}}>
          {detected.qCount>=3?"✅ Questions Detected!":"🔍 Analysis Complete"}
        </p>
        <p style={{fontSize:13,color:"var(--tx)",marginBottom:4}}>📄 {file?.name}</p>
        {detected.qCount>=3?<>
          <p style={{fontSize:13,color:"var(--mu)",marginBottom:2}}>
            Found <strong style={{color:"var(--gn)"}}>{detected.qCount} MCQ questions</strong> in the PDF
          </p>
          <p style={{fontSize:12,color:"var(--mu)"}}>
            Answers detected: <strong style={{color:detected.answersFound>0?"var(--gn)":"var(--yw)"}}>{detected.answersFound}/{detected.qCount}</strong>
          </p>
        </>:<p style={{fontSize:13,color:"var(--mu)"}}>
          No structured Q&A found — AI will generate questions from content
        </p>}
      </div>

      {/* Settings */}
      <div className="ig">
        <label>Test Name *</label>
        <input className="inp" value={settings.name} onChange={e=>setSettings({...settings,name:e.target.value})} placeholder="e.g. TNPSC Group 4 2023"/>
      </div>
      <div className="ig">
        <label>Subject</label>
        <select className="inp" value={settings.subject} onChange={e=>setSettings({...settings,subject:e.target.value})}>

      {detected.qCount<3&&<div className="ig">
        <label>Number of Questions to Generate</label>

      </div>}

      {/* AI Key for AI mode */}
      {detected.qCount<3&&!DB.apiKey()&&<div style={{padding:"12px 14px",borderRadius:12,background:"rgba(239,68,68,.08)",border:"1px solid rgba(239,68,68,.3)",marginBottom:14}}>

function AdminTests({showToast}) {
  const {nav} = useApp();
  const [tests,setTests] = useState(DB.tests());

  const refresh = ()=>setTests(DB.tests());

  const toggle = (id) => {
    const all=DB.tests();
    const i=all.findIndex(t=>t.id===id);
    if(i===-1)return;
    all[i].published=!all[i].published;
    DB.saveT(all);
    showToast({msg:all[i].published?"Test published ✅":"Test unpublished",type:"info"});
    refresh();
  };

  const del = (id) => {
    if(!window.confirm("Delete this test?"))return;
    DB.saveT(DB.tests().filter(t=>t.id!==id));
    showToast({msg:"Test deleted",type:"warning"});
    refresh();
  };

  return <>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
      <div className="stitle" style={{margin:0}}><span>📝</span><span>All Tests ({tests.length})</span></div>
      <button className="btn btn-p btn-xs" onClick={()=>nav("room_create")}>🎮 Create Room</button>
    </div>
    {tests.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"var(--mu)"}}>
      <div style={{fontSize:40,marginBottom:10}}>📭</div>
      <p>No tests yet. Upload a PDF to create one.</p>
    </div>}
    {tests.map(t=>(
      <div key={t.id} className="card" style={{marginBottom:10}}>
        <div className="cp">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
            <div style={{flex:1}}>
              <p style={{fontWeight:700,fontSize:14,marginBottom:4}}>{t.name}</p>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                <span className="badge" style={{background:"var(--s2)",color:"var(--mu)",border:"1px solid var(--bd)"}}>{t.subject}</span>
                <span className="badge" style={{background:"var(--s2)",color:"var(--mu)",border:"1px solid var(--bd)"}}>❓{t.qs?.length||0} Qs</span>
                <span className="badge" style={{background:"var(--s2)",color:"var(--mu)",border:"1px solid var(--bd)"}}>⏱{t.dur}m</span>

              </div>
            </div>
            <span className={`badge ${t.published?"s-active":"s-pending"}`}>{t.published?"Live":"Draft"}</span>
          </div>
        </div>
        <div style={{display:"flex",gap:6,padding:"10px 14px",borderTop:"1px solid var(--bd)",background:"var(--s2)"}}>
          <button className={`btn btn-xs ${t.published?"btn-o":"btn-g"}`} onClick={()=>toggle(t.id)}>
            {t.published?"📴 Unpublish":"📢 Publish"}
          </button>
          <button className="btn btn-xs btn-r" onClick={()=>del(t.id)}>🗑 Delete</button>
        </div>
      </div>
    ))}
  </>;
}

// ROOM HELPERS
// ═══════════════════════════════════════════════════════
function genCode() {
  return Math.random().toString(36).substr(2,6).toUpperCase();
}
function getRooms() {
  return JSON.parse(localStorage.getItem("e11_rooms")||"[]");
}
function saveRooms(r) {
  localStorage.setItem("e11_rooms", JSON.stringify(r));
}
function getRoom(code) {
  return getRooms().find(r=>r.code===code.toUpperCase());
}
function saveRoom(room) {
  const all = getRooms().filter(r=>r.code!==room.code);
  all.unshift(room);
  saveRooms(all.slice(0,50));
}
function addPlayerToRoom(code, player) {
  const room = getRoom(code);
  if (!room) return null;
  if (!room.players.find(p=>p.id===player.id)) {
    room.players.push(player);
    saveRoom(room);
  }
  return room;
}
function updatePlayerScore(code, playerId, score, correct, timeTaken) {
  const room = getRoom(code);
  if (!room) return;
  const p = room.players.find(p=>p.id===playerId);
  if (p) { p.score=score; p.correct=correct; p.timeTaken=timeTaken; p.done=true; }
  saveRoom(room);
}
// Poll for room updates every 2 seconds
function useRoomPoll(code, cb, interval=2000) {
  const ref = useRef(null);
  useEffect(()=>{
    if(!code) return;
    ref.current = setInterval(()=>{
      const room = getRoom(code);
      if(room) cb(room);
    }, interval);
    return ()=>clearInterval(ref.current);
  },[code]);
}

  const rooms    = getRooms().filter(r=>r.status!=="done"||r.players.length>0);
  const publicRooms = rooms.filter(r=>r.public);

  const handleCodeInput = (i,v) => {
    if(!/^[A-Za-z0-9]?$/.test(v)) return;
    const next=[...code]; next[i]=v.toUpperCase(); setCode(next);
    if(v && i<5) codeRefs[i+1].current?.focus();
    if(!v && i>0) codeRefs[i-1].current?.focus();
  };
  const handleCodeKey = (i,e)=>{if(e.key==="Backspace"&&!code[i]&&i>0)codeRefs[i-1].current?.focus();};

  const joinRoom = async() => {
    const c = code.join("").toUpperCase();
    if(c.length!==6){showToast({msg:"Enter full 6-character room code",type:"error"});return;}
    if(!name.trim()){showToast({msg:"Enter your name",type:"error"});return;}

    await new Promise(r=>setTimeout(r,400));
    const room = getRoom(c);
    if(!room){showToast({msg:"Room not found. Check the code and try again.",type:"error"});setJoining(false);return;}
    if(room.status==="done"){showToast({msg:"This room has ended.",type:"warning"});setJoining(false);return;}

    navigator.clipboard?.writeText(code);

// ROOM EXAM (same as normal exam but saves to room)
// ═══════════════════════════════════════════════════════
function RoomExamPage() {
  const {nav,aTest,showToast} = useApp();
  const myData = JSON.parse(localStorage.getItem("e11_room_player")||"{}");
  const code   = localStorage.getItem("e11_room_exam_code")||myData.roomCode||"";
  const room   = getRoom(code);
  const test   = aTest || (room ? {...room,id:room.testId,name:room.testName} : null);

  const [cur,      setCur]     = useState(0);
  const [answers,  setAnswers] = useState({});
  const [marked,   setMarked]  = useState(new Set());
  const [time,     setTime]    = useState((test?.dur||30)*60);
  const [palette,  setPalette] = useState(false);
  const [submitted,setSubmitted]= useState(false);
  const timerRef = useRef(null);

  useEffect(()=>{
    timerRef.current = setInterval(()=>{
      setTime(p=>{if(p<=1){clearInterval(timerRef.current);handleSubmit();return 0;}return p-1;});
    },1000);
    return()=>clearInterval(timerRef.current);
  },[]);

  const qs  = test?.qs||[];
  const N   = qs.length;
  const q   = qs[cur];
  const done = Object.keys(answers).length;
  const fmt  = s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  const crit = time<300;

  const handleSubmit = () => {
    if(submitted) return;
    clearInterval(timerRef.current);
    setSubmitted(true);
    let c=0; qs.forEach((q,i)=>{const a=answers[i];if(a!==undefined&&parseInt(a)===q.ans)c++;});
    const score=Math.round((c/N)*100);
    const timeTaken=(test?.dur||30)*60 - time;
    updatePlayerScore(code, myData.id||"guest", score, c, timeTaken);
    localStorage.setItem("e11_room_my_result",JSON.stringify({score,correct:c,total:N,answers:{...answers},timeTaken}));
    nav("room_leaderboard");
  };

  const qSt=i=>{
    if(marked.has(i)&&answers[i]!==undefined)return"p3";
    if(marked.has(i))return"p2";
    if(answers[i]!==undefined)return"p1";
    if(i<cur)return"p4";
    return"p0";
  };

  if(!test||!qs.length) return <div style={{textAlign:"center",padding:"60px 20px"}}><p>No questions</p><button className="btn btn-p" onClick={()=>nav("rooms")}>Back</button></div>;

  return <div style={{display:"flex",flexDirection:"column",height:"100vh",overflow:"hidden",maxWidth:480,margin:"0 auto"}}>
    {/* Top bar */}
    <div style={{background:"var(--sf)",borderBottom:"1px solid var(--bd)",padding:"10px 12px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
      <div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span className="live-dot"/>
          <p style={{fontWeight:700,fontSize:13}}>{test.name}</p>
        </div>
        <p style={{fontSize:11,color:"var(--mu)"}}>Q {cur+1}/{N} · Room: {code}</p>
      </div>
      <div style={{fontFamily:"'DM Mono',monospace",fontWeight:900,fontSize:18,padding:"6px 12px",borderRadius:10,background:crit?"rgba(239,68,68,.15)":"var(--s2)",color:crit?"var(--rd)":"var(--tx)",flexShrink:0,animation:crit?"pulse 1s infinite":undefined}}>
        ⏱ {fmt(time)}
      </div>
      <button onClick={()=>setPalette(true)} style={{width:32,height:32,borderRadius:8,background:"var(--s2)",border:"1px solid var(--bd)",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>🔲</button>
    </div>

    {/* Progress */}
    <div style={{height:3,background:"var(--s2)",flexShrink:0}}>
      <div style={{height:"100%",background:"linear-gradient(90deg,var(--ac),var(--a2))",width:`${(done/N)*100}%`,transition:"width .3s"}}/>
    </div>

    {/* Question */}
    <div style={{flex:1,overflowY:"auto",padding:14}}>
      {q&&<>
        <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
          <span className="badge b-mcq">{q.type?.toUpperCase()||"MCQ"}</span>
          <span className={`badge b-${q.diff==="Hard"?"hard":q.diff==="Easy"?"easy":"medium"}`}>{q.diff||"Medium"}</span>
        </div>
        <div className="card cp" style={{marginBottom:14}}>
          <p style={{fontSize:16,fontWeight:600,lineHeight:1.7}} className={q.lang==="ta"?"ta":""}>{q.q}</p>
        </div>
        {(q.opts||[]).map((opt,i)=>(
          <button key={i} className={`opt${answers[cur]===i?" sel":""}`} onClick={()=>setAnswers({...answers,[cur]:i})}>
            <div className="opt-lt" style={{background:answers[cur]===i?"var(--ac)":"var(--s2)",color:answers[cur]===i?"#000":"var(--mu)"}}>
              {String.fromCharCode(65+i)}
            </div>
            <span style={{fontSize:14,flex:1,textAlign:"left",lineHeight:1.5}} className={q.lang==="ta"?"ta":""}>{opt}</span>
          </button>
        ))}
      </>}
    </div>

    {/* Controls */}
    <div style={{background:"var(--sf)",borderTop:"1px solid var(--bd)",padding:"10px 12px",flexShrink:0}}>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <button className="btn btn-navy btn-sm" style={{flex:1}} onClick={()=>setCur(Math.max(0,cur-1))} disabled={cur===0}>← Prev</button>
        <button className={`btn btn-sm ${marked.has(cur)?"btn-red":"btn-ghost"}`} style={{width:"auto",padding:"9px 12px"}}
          onClick={()=>{const m=new Set(marked);m.has(cur)?m.delete(cur):m.add(cur);setMarked(m);}}>🚩</button>
        <button className="btn btn-amber btn-sm" style={{flex:1}} onClick={()=>cur<N-1?setCur(cur+1):handleSubmit()}>
          {cur<N-1?"Next →":"Submit ✓"}
        </button>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:"var(--mu)"}}>
        <span>✅<strong style={{color:"var(--gn)"}}>{done}</strong> ❌<strong style={{color:"var(--rd)"}}>{N-done}</strong></span>
        <button className="btn btn-green btn-xs" onClick={handleSubmit}>Submit ✓</button>
      </div>
    </div>

    {/* Palette */}
    {palette&&<div className="overlay" onClick={()=>setPalette(false)}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="pill"/>
        <p style={{fontWeight:800,marginBottom:12}}>Question Palette</p>
        <div className="pal">
          {qs.map((_,i)=><button key={i} className={`pb p${qSt(i).slice(1)}`}
            style={{outline:i===cur?"2px solid var(--ac)":"none",outlineOffset:2}}
            onClick={()=>{setCur(i);setPalette(false);}}>
            {i+1}
          </button>)}
        </div>
        <button className="btn btn-navy" style={{marginTop:16}} onClick={()=>setPalette(false)}>Close</button>
      </div>
    </div>}
  </div>;
}

function startDailyChallenge() {
  const tests = DB.tests();
  const allQs  = tests.flatMap(t=>t.qs||[]);
  if(!allQs.length){
    // No questions yet - show message via toast hack
    const t=document.createElement('div');
    t.className='toast';
    t.style.cssText='position:fixed;top:68px;left:50%;transform:translateX(-50%);z-index:999;background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:12px 18px;font-size:13px;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.4);animation:scaleIn .22s ease;display:flex;align-items:center;gap:8px;border-left:3px solid var(--yw)';
    t.innerHTML='⚠️ No tests available yet. Admin must upload a PDF first.';
    document.body.appendChild(t);
    setTimeout(()=>t.remove(),3500);
    return;
  }
  // Seed with today's date so same questions all day
  const seed = new Date().toDateString();
  const seeded = [...allQs].sort((a,b)=>{
    const ha = (a.q+seed).split('').reduce((acc,c)=>acc+c.charCodeAt(0),0);
    const hb = (b.q+seed).split('').reduce((acc,c)=>acc+c.charCodeAt(0),0);
    return ha-hb;
  });
  const dailyQs = seeded.slice(0,Math.min(20,seeded.length));
  // Push a synthetic test via context nav
  window._dailyTest = {
    id:'daily_'+new Date().toDateString().replace(/\s/g,'_'),
    name:'🔥 Daily Challenge — '+new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short'}),
    subject:'Mixed Topics',
    dur:15,
    diff:'Mixed',
    qs:dailyQs,
    builtIn:true,
  };
  // Trigger nav via custom event so React can handle it
  window.dispatchEvent(new CustomEvent('e11_daily',{detail:window._dailyTest}));
}

// WRONG ANSWERS PRACTICE PAGE
// ═══════════════════════════════════════
function WrongAnswersPage() {
  const {nav} = useApp();
  const [wrong, setWrong] = React.useState(()=>JSON.parse(localStorage.getItem('e11_wrong_qs')||'[]'));
  const [idx,   setIdx]   = React.useState(0);
  const [ans,   setAns]   = React.useState(undefined);
  const [shown, setShown] = React.useState(false);
  const [score, setScore] = React.useState({c:0,w:0});

  const q = wrong[idx];

  const check = () => {
    if(ans===undefined) return;
    setShown(true);
    const correct = parseInt(ans)===q.ans;
    setScore(s=>({c:s.c+(correct?1:0),w:s.w+(correct?0:1)}));
  };

  const next = () => {
    setIdx(i=>i+1);
    setAns(undefined);
    setShown(false);
  };

  const clearAll = () => {
    localStorage.removeItem('e11_wrong_qs');
    setWrong([]);
    setIdx(0);
  };

  return <>
    <div className="topnav">
      <button onClick={()=>nav("home")} style={{width:36,height:36,borderRadius:10,background:"var(--s2)",border:"1px solid var(--bd)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:"var(--mu)"}}>←</button>
      <span style={{fontWeight:900,fontSize:17,flex:1}}>Wrong Answers</span>
      {wrong.length>0&&<button onClick={clearAll} style={{fontSize:12,color:"var(--rd)",fontWeight:700,padding:"6px 12px",borderRadius:8,background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.2)"}}>Clear All</button>}
    </div>
    <div className="page">
      {wrong.length===0
        ?<div style={{textAlign:"center",padding:"60px 20px"}}>
            <div style={{fontSize:56,marginBottom:14}}>🎉</div>
            <p style={{fontWeight:800,fontSize:18,marginBottom:8}}>No Wrong Answers!</p>
            <p style={{fontSize:14,color:"var(--mu)",marginBottom:24}}>Take some tests first. Wrong answers will be saved here automatically for practice.</p>
            <button className="btn btn-p" onClick={()=>nav("tests")}>Browse Tests →</button>
          </div>
        :idx>=wrong.length
          ?<div style={{textAlign:"center",padding:"60px 20px"}}>
              <div style={{fontSize:56,marginBottom:14}}>✅</div>
              <p style={{fontWeight:800,fontSize:18,marginBottom:8}}>Practice Complete!</p>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,maxWidth:260,margin:"16px auto"}}>
                <div className="sb"><div style={{fontSize:22,fontWeight:900,color:"var(--gn)"}}>{score.c}</div><div style={{fontSize:11,color:"var(--mu)"}}>Correct</div></div>
                <div className="sb"><div style={{fontSize:22,fontWeight:900,color:"var(--rd)"}}>{score.w}</div><div style={{fontSize:11,color:"var(--mu)"}}>Wrong</div></div>
              </div>
              <button className="btn btn-p" style={{maxWidth:240,margin:"0 auto"}} onClick={()=>{setIdx(0);setAns(undefined);setShown(false);setScore({c:0,w:0});}}>Practice Again 🔁</button>
            </div>
          :<>
              {/* Score mini */}
              <div style={{display:"flex",gap:8,marginBottom:14}}>
                {[{v:score.c,c:"var(--gn)",i:"✅"},{v:score.w,c:"var(--rd)",i:"❌"},{v:`${idx+1}/${wrong.length}`,c:"var(--ac)",i:"📋"}].map(s=>(
                  <div key={s.i} className="sb" style={{flex:1}}>
                    <div style={{fontSize:16,fontWeight:900,color:s.c}}>{s.v}</div>
                    <div style={{fontSize:10,color:"var(--mu)"}}>{s.i}</div>
                  </div>
                ))}
              </div>

              {/* Question */}
              {q&&<>
                <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                  <span className={`badge b-${(q.type||'mcq')==='mcq'?'mcq':'tf'}`}>{(q.type||'MCQ').toUpperCase()}</span>
                  <span className={`badge b-${q.diff==='Hard'?'hard':q.diff==='Easy'?'easy':'medium'}`}>{q.diff||'Medium'}</span>
                  {q.topic&&<span style={{fontSize:11,color:"var(--mu)",marginLeft:"auto"}}>{q.topic}</span>}
                </div>
                <div className="card cp" style={{marginBottom:14}}>
                  <p style={{fontSize:15,fontWeight:600,lineHeight:1.7}} className={q.lang==="ta"?"ta":""}>{q.q}</p>
                </div>
                {(q.opts||[]).map((opt,i)=>{
                  let cls="";
                  if(shown){
                    if(i===q.ans) cls=" ok";
                    else if(String(ans)===String(i)&&i!==q.ans) cls=" ng";
                  } else {
                    if(String(ans)===String(i)) cls=" sel";
                  }
                  return <button key={i} className={`opt${cls}`} onClick={()=>!shown&&setAns(i)}>
                    <div className="opt-lt" style={{background:String(ans)===String(i)?"var(--ac)":shown&&i===q.ans?"var(--gn)":"var(--s2)",color:String(ans)===String(i)||shown&&i===q.ans?"#000":"var(--mu)",fontSize:13,fontWeight:800}}>
                      {String.fromCharCode(65+i)}
                    </div>
                    <span style={{fontSize:14,flex:1,textAlign:"left",lineHeight:1.5}} className={q.lang==="ta"?"ta":""}>{opt}</span>
                    {shown&&i===q.ans&&<span style={{color:"var(--gn)",flexShrink:0}}>✓</span>}
                  </button>;
                })}
                {shown&&q.exp&&<div style={{padding:"12px 14px",borderRadius:12,background:"rgba(245,158,11,.08)",border:"1px solid rgba(245,158,11,.2)",marginTop:8}}>
                  <p style={{fontSize:12,fontWeight:700,color:"var(--ac)",marginBottom:4}}>💡 Explanation</p>
                  <p style={{fontSize:13,color:"var(--mu)",lineHeight:1.6}} className={q.lang==="ta"?"ta":""}>{q.exp}</p>
                </div>}
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  {!shown
                    ?<button className="btn btn-p" onClick={check} disabled={ans===undefined}>Check Answer</button>
                    :<button className="btn btn-p" onClick={next}>Next →</button>
                  }
                  <button className="btn btn-ghost" style={{width:"auto",padding:"14px 16px"}} onClick={next}>Skip</button>
                </div>
              </>}
            </>
      }
    </div>
    <BottomNav/>
  </>;
}


function App() {
  const [page,    setPage]    = useState("login");
  const [user,    setUser]    = useState(null);
  const [darkMode,setDarkMode]= useState(true);
  const [aTest,   setATest]   = useState(null);
  const [result,  setResult]  = useState(null);
  const [toast,   setToast]   = useState(null);

  useEffect(()=>{
    const s = DB.session();
    if(s){ setUser(s); setPage(s.role==="admin"?"admin":"home"); }
    const dm = localStorage.getItem("e11_dark");
    if(dm!==null) setDarkMode(dm==="true");

    // Listen for demo login
    const handler = (e) => {
      const {user, role} = e.detail;
      setUser(user);
      setPage(role==="admin"?"admin":"home");
    };
    window.addEventListener("e11_demo_login", handler);

    // Listen for daily challenge
    const dailyHandler = (e) => {
      setATest(e.detail);
      setPage("test_intro");
    };
    window.addEventListener("e11_daily", dailyHandler);

    // Listen for admin actions that need re-render
    const rerenderHandler = () => {
      // Force React to re-render by toggling a dummy state
      setToast(null);
    };
    window.addEventListener("e11_rerender", rerenderHandler);

    return ()=>{
      window.removeEventListener("e11_demo_login",handler);
      window.removeEventListener("e11_daily",dailyHandler);
      window.removeEventListener("e11_rerender",rerenderHandler);
    };
  },[]);

  useEffect(()=>{
    document.documentElement.className = darkMode?"":"light";
    localStorage.setItem("e11_dark", darkMode);
  },[darkMode]);

  const nav       = p=>setPage(p);
  const showToast = t=>setToast(t);
  useEffect(()=>{ if(toast){const id=setTimeout(()=>setToast(null),3500);return()=>clearTimeout(id);} },[toast]);

  const render = () => {
    switch(page){
      case "login":           return <LoginPage/>;
      case "home":            return <HomePage/>;
      case "tests":           return <TestsPage/>;
      case "exam":            return <ExamPage/>;
      case "result":          return <ResultPage/>;
      case "results":         return <ResultsPage/>;
      case "profile":         return <ProfilePage/>;
      case "admin":           return <AdminPanel/>;
      case "rooms":           return <RoomsPage/>;
      case "room_create":     return <CreateRoomPage/>;
      case "room_host":       return <RoomHostPage/>;
      case "room_waiting":    return <RoomWaitingPage/>;
      case "room_exam":       return <RoomExamPage/>;
      case "room_leaderboard":return <RoomLeaderboardPage/>;
      case "wrong_answers":   return <WrongAnswersPage/>;
      case "daily":           return <ExamPage/>;
      default:                return <HomePage/>;
    }
  };

  // Check if user is blocked after session restore
  useEffect(()=>{
    if(user&&user.role!=="admin"){
      const fresh = DB.users().find(u=>u.id===user.id);
      if(fresh&&(fresh.status==="suspended"||fresh.status==="pending"||fresh.status==="banned")){
        setPage("login"); // will show blocked screen on next login
      }
    }
  },[user]);

  return (
    <Ctx.Provider value={{page,nav,user,setUser,darkMode,setDarkMode,aTest,setATest,result,setResult,showToast,darkMode,setDarkMode}}>
      <div id="app">
        {render()}
        {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
      </div>
    </Ctx.Provider>
  );
}

const container = document.getElementById("root");
const root = ReactDOM.createRoot(container);
root.render(<App/>);
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js')
      .then(r=>console.log('SW registered'))
      .catch(e=>console.warn('SW failed:',e));
  });
}
</script>
</body>
