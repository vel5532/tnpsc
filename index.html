<style>
/* ══════════════════════════════════════════
   DESIGN SYSTEM
══════════════════════════════════════════ */
:root{
  --bg:#0b1120;--sf:#111827;--s2:#1f2a3d;--s3:#263348;
  --bd:rgba(255,255,255,.09);--b2:rgba(255,255,255,.15);
  --tx:#eef2ff;--mu:#7c8fbd;
  --ac:#f59e0b;--a2:#fbbf24;--a3:#06b6d4;
  --gn:#10b981;--rd:#ef4444;--or:#f97316;--yw:#eab308;--pu:#8b5cf6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--tx);font-family:'DM Sans',sans-serif;min-height:100%;-webkit-font-smoothing:antialiased;overflow-x:hidden}
.ta{font-family:'Noto Sans Tamil','DM Sans',sans-serif!important}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--s3);border-radius:3px}
input,select,textarea,button{font-family:'DM Sans',sans-serif;border:none;outline:none}
button{cursor:pointer;background:none;color:inherit}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 24px rgba(245,158,11,.3)}50%{box-shadow:0 0 48px rgba(245,158,11,.6)}}
@keyframes scaleIn{from{transform:scale(.88);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes livePulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.3);opacity:.6}}

/* LAYOUT */
#root{max-width:480px;margin:0 auto;min-height:100vh}
.page{padding:72px 16px 82px;animation:fadeUp .3s ease}
.fullpage{min-height:100vh;display:flex;flex-direction:column}

/* NAV */
.topnav{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:200;height:58px;display:flex;align-items:center;padding:0 14px;gap:10px;background:rgba(11,17,32,.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd)}
.bottomnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:200;height:66px;display:flex;align-items:stretch;padding:6px 4px 10px;background:var(--sf);border-top:1px solid var(--bd);gap:2px}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;border-radius:11px;font-size:10px;font-weight:700;color:var(--mu);cursor:pointer;padding:4px 2px;border:none;background:none;transition:all .2s}
.bni.on{color:var(--ac);background:rgba(245,158,11,.1)}
.bni .ic{font-size:21px;line-height:1}

/* CARDS */
.card{background:rgba(255,255,255,.04);border:1px solid var(--bd);border-radius:14px;overflow:hidden;transition:all .2s}
.card:active{transform:scale(.98)}
.cp{padding:16px}
.card-gold{background:linear-gradient(135deg,rgba(245,158,11,.12),rgba(251,191,36,.05));border-color:rgba(245,158,11,.3)}
.card-green{background:rgba(16,185,129,.07);border-color:rgba(16,185,129,.25)}
.card-red{background:rgba(239,68,68,.07);border-color:rgba(239,68,68,.25)}
.card-blue{background:rgba(6,182,212,.07);border-color:rgba(6,182,212,.25)}
.card-purple{background:rgba(139,92,246,.07);border-color:rgba(139,92,246,.25)}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px 20px;border-radius:13px;font-weight:700;font-size:15px;cursor:pointer;border:none;transition:all .18s}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.45;pointer-events:none}
.btn-gold{background:linear-gradient(135deg,#f59e0b,#fbbf24);color:#000;box-shadow:0 4px 20px rgba(245,158,11,.35)}
.btn-green{background:linear-gradient(135deg,#059669,#10b981);color:#fff}
.btn-red{background:linear-gradient(135deg,#dc2626,#ef4444);color:#fff}
.btn-blue{background:linear-gradient(135deg,#0891b2,#06b6d4);color:#fff}
.btn-navy{background:var(--s2);color:var(--tx);border:1px solid var(--b2)}
.btn-ghost{background:transparent;color:var(--mu);border:1px solid var(--bd)}
.btn-purple{background:linear-gradient(135deg,#7c3aed,#8b5cf6);color:#fff}
.btn-sm{padding:9px 16px;font-size:13px;border-radius:10px}
.btn-xs{padding:6px 12px;font-size:12px;border-radius:8px;width:auto}

/* INPUTS */
.inp{width:100%;padding:13px 16px;background:var(--s2);border:1.5px solid var(--b2);border-radius:11px;color:var(--tx);font-size:15px;transition:border .2s}
.inp:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(245,158,11,.12)}
.inp::placeholder{color:var(--mu)}
.inp-dark{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.14);color:#fff}
.inp-dark::placeholder{color:rgba(255,255,255,.35)}
.inp-dark:focus{border-color:var(--ac)}
.ig{margin-bottom:14px}
.ig label{display:block;font-size:11px;font-weight:700;color:var(--mu);margin-bottom:6px;letter-spacing:.6px;text-transform:uppercase}
.iw{position:relative}
.iico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none}
.ipl{padding-left:44px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700}
.b-gold{background:rgba(245,158,11,.15);color:var(--ac);border:1px solid rgba(245,158,11,.3)}
.b-green{background:rgba(16,185,129,.15);color:var(--gn);border:1px solid rgba(16,185,129,.3)}
.b-red{background:rgba(239,68,68,.15);color:var(--rd);border:1px solid rgba(239,68,68,.3)}
.b-blue{background:rgba(6,182,212,.15);color:var(--a3);border:1px solid rgba(6,182,212,.3)}
.b-purple{background:rgba(139,92,246,.15);color:var(--pu);border:1px solid rgba(139,92,246,.3)}
.b-gray{background:var(--s2);color:var(--mu);border:1px solid var(--bd)}

/* OVERLAY / MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:400;display:flex;align-items:flex-end;animation:fadeUp .18s}
.sheet{background:var(--sf);border-radius:22px 22px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding:18px 18px 32px;animation:slideUp .26s ease}
.pill{width:38px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto 16px}

/* EXAM OPTIONS */
.opt{display:flex;align-items:flex-start;gap:12px;padding:13px;border-radius:13px;border:2px solid var(--b2);cursor:pointer;transition:all .18s;background:rgba(255,255,255,.03);margin-bottom:9px;width:100%;text-align:left}
.opt:active{transform:scale(.98)}
.opt.sel{border-color:var(--ac);background:rgba(245,158,11,.08)}
.opt.ok{border-color:var(--gn);background:rgba(16,185,129,.08)}
.opt.ng{border-color:var(--rd);background:rgba(239,68,68,.08)}
.opt-lt{width:33px;height:33px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}

/* PALETTE */
.pal{display:grid;grid-template-columns:repeat(8,1fr);gap:5px}
.pb{aspect-ratio:1;border-radius:7px;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;transition:transform .15s}
.pb:active{transform:scale(.85)}
.p0{background:var(--s2);color:var(--mu)}
.p1{background:var(--gn);color:#fff}
.p2{background:var(--or);color:#fff}
.p3{background:var(--ac);color:#000}
.p4{background:rgba(239,68,68,.25);color:var(--rd)}

/* PROGRESS */
.pbar{height:6px;background:var(--s2);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;transition:width .6s ease}

/* TOAST */
.toast{position:fixed;top:66px;left:50%;transform:translateX(-50%);z-index:999;background:var(--sf);border:1px solid var(--b2);border-radius:12px;padding:11px 18px;font-size:13px;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.5);animation:scaleIn .2s ease;display:flex;align-items:center;gap:8px;max-width:90vw;white-space:pre-line}

/* SPIN */
.spin{animation:spin 1s linear infinite;border-radius:50%}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--gn);display:inline-block;animation:livePulse 1.5s ease-in-out infinite}

/* STAT GRID */
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sb{padding:14px;border-radius:13px;background:var(--s2);border:1px solid var(--bd);text-align:center}

/* SECTION TITLE */
.stitle{font-size:14px;font-weight:800;display:flex;align-items:center;gap:7px;margin-bottom:12px}

/* DIVIDER */
.divider{height:1px;background:var(--bd);margin:14px 0}

/* SCORE RING */
.score-ring{position:relative;display:inline-flex;align-items:center;justify-content:center}
.score-inner{position:absolute;text-align:center}

/* ROOM CODE */
.room-code{font-family:'DM Mono',monospace;font-size:28px;font-weight:900;letter-spacing:6px;color:var(--ac);text-align:center;padding:16px;background:rgba(245,158,11,.08);border:2px solid rgba(245,158,11,.3);border-radius:14px;cursor:pointer}
.player-row{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:11px;background:var(--s2);border:1px solid var(--bd);margin-bottom:8px}
.player-av{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--ac),var(--a3));display:flex;align-items:center;justify-content:center;font-weight:900;font-size:14px;color:#000;flex-shrink:0}

/* MONEY TAG */
.money-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-weight:800;font-size:14px;background:linear-gradient(135deg,rgba(245,158,11,.2),rgba(251,191,36,.1));border:1px solid rgba(245,158,11,.4);color:var(--ac)}
</style>

 called 'Year of Small Divide' in terms of population growth rate in India.", "con": "Population Studies"}, {"id": 6, "q": "In which desert is Noor Complex located?", "opts": ["Sahara Desert", "Thar Desert", "Kalhari Desert", "Gopi Desert"], "ans": 0, "topic": "Geography", "chapter": "World Geography", "diff": "Medium", "exp": "Noor Complex, one of the world's largest solar power plants, is located in the Sahara Desert in Morocco.", "con": "World Geography"}, {"id": 7, "q": "Which of the following statement(s) is/are correct? 1. In 2019, World Environment Day was Celebrated in China. 2. The Theme for the World Environment Day is Air Pollution.", "opts": ["1 and 2 are true", "1 is true, 2 is false", "1 and 2 are false", "2 is true, 1 is false"], "ans": 0, "topic": "Current Affairs", "chapter": "Environment", "diff": "Medium", "exp": "Both statements are correct. World Environment Day 2019 was celebrated in China and the theme was 'Air Pollution'.", "con": "World Environment Day"}, {"id": 8, "q": "The objective of Jandhan Yojana is", "opts": ["Financial inclusion", "Reducing regional disparities", "Social exclusion", "Population control"], "ans": 0, "topic": "Economics", "chapter": "Government Schemes", "diff": "Easy", "exp": "Jan Dhan Yojana's primary objective is financial inclusion — providing banking services to the unbanked population.", "con": "Government Schemes"}, {"id": 9, "q": "France has _______ party system.", "opts": ["Single party", "Biparty", "Multi party", "None"], "ans": 2, "topic": "Polity", "chapter": "World Politics", "diff": "Easy", "exp": "France has a Multi party system with many political parties participating in elections.", "con": "Political Systems"}, {"id": 10, "q": "Which water conservation campaign has been recently launched by the Central Government?", "opts": ["Jal Bachav Abhiyan", "Jal Tarang Abhiyan", "Jal Suraksha Abhiyan", "Jal Shakthi Abhiyan"], "ans": 3, "topic": "Current Affairs", "chapter": "Government Schemes", "diff": "Easy", // Opens Razorpay checkout, resolves with payment details on success
function openRazorpay({amount, description, userName, userPhone, metadata={}}) {
  return new Promise((resolve, reject) => {
    if (!RAZORPAY_KEY_ID || RAZORPAY_KEY_ID.includes('XXXXXXX')) {
      // Demo mode — simulate payment
      const fakeId = 'demo_pay_' + Date.now();
      resolve({ razorpay_payment_id: fakeId, razorpay_order_id: 'demo_order', demo: true });
      return;
    }

    const options = {
      key:          RAZORPAY_KEY_ID,
      amount:       amount * 100,          // Razorpay uses paise
      currency:     'INR',
      name:         'TEST 11',
      description,
      image:        'https://i.imgur.com/n5tjHFD.png',
      prefill: {
        name:    userName,
        contact: '+91' + userPhone,
      },
      notes:        metadata,
      theme:        { color: '#f59e0b' },
      modal: {
        ondismiss: () => reject(new Error('Payment cancelled')),
      },
      handler: (response) => resolve(response),
    };

    const rzp = new Razorpay(options);
    rzp.on('payment.failed', (resp) => reject(new Error(resp.error.description)));
    rzp.open();
  });
}

// ── ENHANCED createPayment — uses Razorpay automatically ────
async function payWithRazorpay(user, type, amount, roomCode='') {
  const desc = type === 'subscription'
    ? `TEST 11 Monthly Subscription — ${new Date().toLocaleString('en-IN',{month:'long',year:'numeric'})}`
    : `TEST 11 Game Room Entry — #${roomCode}`;

  toast('Opening payment...', 'info', 2000);

  let razorpayId = null;
  let demo = false;

  try {
    const response = await openRazorpay({
      amount,
      description: desc,
      userName:    user.name,
      userPhone:   user.phone,
      metadata:    { type, roomCode, userId: user.phone },
    });
    razorpayId = response.razorpay_payment_id;
    demo       = response.demo || false;
  } catch(err) {
    if (err.message === 'Payment cancelled') {
      toast('Payment cancelled', 'warning'); return null;
    }
    // Fallback to manual UPI if Razorpay fails
    toast('Razorpay unavailable — switching to manual UPI', 'warning');
    return null;
  }

  // Save payment record
  const pay = {
    id:           `pay_${Date.now()}_${Math.random().toString(36).substr(2,4)}`,
    userId:       user.phone,
    userName:     user.name,
    phone:        user.phone,
    type,
    amount,
    roomCode,
    razorpayId,
    status:       demo ? 'approved' : 'approved',  // Razorpay = instant approve
    payMethod:    demo ? 'demo' : 'razorpay',
    upiRef:       razorpayId,
    createdAt:    new Date().toISOString(),
    approvedAt:   new Date().toISOString(),
  };

  // Save locally
  const all = [pay, ...getPayments()].slice(0, 500);
  savePayments(all);

  // Save to Firestore
  await fsSet('payments', pay.id, pay);

  // Sync to Google Sheets
  await syncToSheets({
    sheet:     'Payments',
    id:        pay.id,
    name:      user.name,
    phone:     user.phone,
    type:      pay.type,
    amount:    '₹' + amount,
    method:    pay.payMethod,
    razorpayId,
    roomCode,
    status:    pay.status,
  });

  // Auto-activate subscription
  if (type === 'subscription') {
    const users = getUsers();
    const i     = users.findIndex(u => u.phone === user.phone);
    if (i >= 0) {
      users[i].status     = 'active';
      users[i].subPaid    = true;
      users[i].paidUntil  = new Date(Date.now() + 30*24*60*60*1000).toISOString();
      users[i].lastPaidAt = new Date().toISOString();
      saveUsers(users);
      await fsUpdate('users', user.phone, {
        status: 'active', subPaid: true,
        paidUntil: users[i].paidUntil,
        lastPaidAt: users[i].lastPaidAt,
      });
      if (S.user && S.user.phone === user.phone) { S.user = users[i]; saveSession(S.user); }
    }
    // Sheets log
    await syncToSheets({ sheet:'Subscriptions', name:user.name, phone:user.phone, amount:'₹'+amount, razorpayId, paidUntil:users.find(u=>u.phone===user.phone)?.paidUntil||'' });
  }

  // Auto-add to room if room_entry
  if (type === 'room_entry' && roomCode) {
    const rooms = getRooms();
    const ri    = rooms.findIndex(r => r.code === roomCode);
    if (ri >= 0) {
      if (!rooms[ri].members) rooms[ri].members = [];
      if (!rooms[ri].members.find(m => m.phone === user.phone)) {
        rooms[ri].members.push({ name:user.name, phone:user.phone, joined:new Date().toISOString() });
        rooms[ri].pool = (rooms[ri].pool || 0) + amount;
        saveRooms(rooms);
        await fsSet('rooms', roomCode, rooms[ri]);
      }
    }
    await syncToSheets({ sheet:'RoomEntries', roomCode, name:user.name, phone:user.phone, amount:'₹'+amount, razorpayId });
  }

  return pay;
}

// ── ADMIN MANUAL PAYMENT APPROVAL (UPI fallback) ────────────
async function approvePayment(payId) {
  const all = getPayments();
  const i   = all.findIndex(p => p.id === payId);
  if (i < 0) return;
  all[i].status     = 'approved';
  all[i].approvedAt = new Date().toISOString();
  savePayments(all);
  await fsUpdate('payments', payId, { status:'approved', approvedAt:all[i].approvedAt });
  const pay = all[i];

  if (pay.type === 'subscription') {
    const users = getUsers();
    const ui    = users.findIndex(u => u.phone === pay.phone);
    if (ui >= 0) {
      users[ui].status    = 'active';
      users[ui].subPaid   = true;
      users[ui].paidUntil = new Date(Date.now() + 30*24*60*60*1000).toISOString();
      saveUsers(users);
      await fsUpdate('users', pay.phone, { status:'active', subPaid:true, paidUntil:users[ui].paidUntil });
      if (S.user && S.user.phone === pay.phone) { S.user = users[ui]; saveSession(S.user); }
    }
  }
  if (pay.type === 'room_entry' && pay.roomCode) {
    const rooms = getRooms();
    const ri    = rooms.findIndex(r => r.code === pay.roomCode);
    if (ri >= 0) {
      if (!rooms[ri].members) rooms[ri].members = [];
      if (!rooms[ri].members.find(m => m.phone === pay.phone)) {
        rooms[ri].members.push({ name:pay.userName, phone:pay.phone, joined:new Date().toISOString() });
        rooms[ri].pool = (rooms[ri].pool || 0) + pay.amount;
        saveRooms(rooms);
        await fsSet('rooms', pay.roomCode, rooms[ri]);
      }
    }
  }
  await syncToSheets({ sheet:'Payments', id:payId, status:'approved (manual)', approvedAt:all[i].approvedAt });
}

async function rejectPayment(payId) {
  const all = getPayments();
  const i   = all.findIndex(p => p.id === payId);
  if (i >= 0) {
    all[i].status = 'rejected';
    savePayments(all);
    await fsUpdate('payments', payId, { status:'rejected' });
    await syncToSheets({ sheet:'Payments', id:payId, status:'rejected' });
  }
}

let toastTimer;
function toast(msg, type='info', dur=3000) {
  const icons = {success:'✅',error:'❌',info:'ℹ️',warning:'⚠️'};
  const colors = {success:'var(--gn)',error:'var(--rd)',info:'var(--ac)',warning:'var(--or)'};
  document.querySelectorAll('.toast').forEach(e=>e.remove());
  clearTimeout(toastTimer);
  const t = document.createElement('div');
  t.className='toast';
  t.style.borderLeft=`3px solid ${colors[type]||colors.info}`;
  t.innerHTML=`<span>${icons[type]||'ℹ️'}</span><span>${msg}</span>`;
  document.body.appendChild(t);
  toastTimer=setTimeout(()=>t.remove(), dur);
}

// ─── FIRESTORE HELPERS ────────────────────────────────────────
async function fsGet(col, id) {
  const fb = window._fb;
  if (!fb) return null;
  try { const s=await fb.getDoc(fb.doc(fb.db,col,id)); return s.exists()?{id:s.id,...s.data()}:null; }
  catch(e) { return null; }
}
async function fsSet(col, id, data) {
  const fb = window._fb;
  if (!fb) return;
  try { await fb.setDoc(fb.doc(fb.db,col,id),data,{merge:true}); } catch(e) {}
}
async function fsUpdate(col, id, data) {
  const fb = window._fb;
  if (!fb) return;
  try { await fb.updateDoc(fb.doc(fb.db,col,id),data); } catch(e) {}
}
async function fsGetAll(col) {
  const fb = window._fb;
  if (!fb) return [];
  try { const s=await fb.getDocs(fb.collection(fb.db,col)); return s.docs.map(d=>({id:d.id,...d.data()})); }
  catch(e) { return []; }
}

function getUsers()      { return LS.g('users',[]); }

function getSession()    { return LS.g('session'); }
function saveSession(u)  { LS.s('session',u); }
function clearSession()  { LS.d('session'); }

async function getUser(phone) {
  let u = getUsers().find(x=>x.phone===phone);
  if (!u) { const fu=await fsGet('users',phone); if(fu){u=fu; const all=getUsers(); const i=all.findIndex(x=>x.phone===phone); if(i>=0)all[i]=fu;else all.push(fu); saveUsers(all);} }
  return u||null;
}
async function saveUser(user) {
  const all=getUsers(); const i=all.findIndex(x=>x.phone===user.phone);
  if(i>=0)all[i]={...all[i],...user};else all.push(user);
  saveUsers(all);
  await fsSet('users',user.phone,user);
}

function isSubscribed(phone) {
  if(!phone) return false;
  if(phone===ADMIN_PHONE) return true;
  const u=getUsers().find(x=>x.phone===phone);
  if(!u) return false;
  if(u.role==='admin') return true;
  if(!u.paidUntil) return false;
  return new Date(u.paidUntil)>new Date();
}

async function doLogin() {

  if (!/^[0-9]{10}$/.test(phone)) { toast('Enter valid 10-digit number','error'); return; }

  const btn = document.getElementById('login_btn');
  btn.disabled=true; btn.textContent='Checking...';

  // Admin shortcut
  if (phone===ADMIN_PHONE) {
    const admin={id:phone,name,phone,role:'admin',status:'active',createdAt:new Date().toISOString()};
    await saveUser(admin); saveSession(admin); S.user=admin;
    toast(`Welcome Admin, ${name}! 👑`,'success'); go('admin'); return;
  }

  // Check existing
  let user = await getUser(phone);
  if (!user) {
    user={id:phone,name,phone,role:'student',status:'pending',createdAt:new Date().toISOString()};
    await saveUser(user); toast('Account created! Waiting for admin approval.','info');
  } else if (user.name!==name) { user.name=name; await saveUser(user); }

  saveSession(user); S.user=user;
  if      (user.status==='banned')    { clearSession(); S.user=null; toast('Account banned. Contact admin.','error'); btn.disabled=false; btn.textContent='Sign In →'; return; }
  else if (user.status==='active')    { toast(`Welcome back, ${user.name}! 👋`,'success'); go('home'); }
  else                                { go('pending'); }
}

function startExam(testId) {
  const test=getTests().find(t=>t.id===testId);
  if(!test||!test.qs?.length){toast('No questions','error');return;}
  S.examSession={ test, qs:shuffle([...test.qs]), answers:{}, marked:new Set(), cur:0, timeLeft:test.dur*60, startTime:Date.now() };
  clearInterval(S.examTimer);
  S.examTimer=setInterval(()=>{
    if(!S.examSession){clearInterval(S.examTimer);return;}
    S.examSession.timeLeft--;
    const el=document.getElementById('exam_timer');
    if(el){el.textContent='⏱ '+fmtTime(S.examSession.timeLeft);if(S.examSession.timeLeft<300){el.style.color='var(--rd)';}}
    if(S.examSession.timeLeft<=0){clearInterval(S.examTimer);submitExam();}
  },1000);
  go('exam');
}

        ${[{l:'Total',v:N},{l:'Answered',v:done,c:'var(--gn)'},{l:'Unanswered',v:N-done,c:'var(--rd)'},{l:'Marked',v:marked.size,c:'var(--or)'}]

function selectOpt(i) {
  if(!S.examSession)return;
  S.examSession.answers[S.examSession.cur]=i;
  const area=document.getElementById('exam_q_area');
  if(area){ const q=S.examSession.qs[S.examSession.cur]; const qs=q.opts||[];
    area.querySelectorAll('.opt').forEach((el,j)=>{
      el.className='opt'+(i===j?' sel':'');
      el.querySelector('.opt-lt').style.background=i===j?'var(--ac)':'var(--s2)';
      el.querySelector('.opt-lt').style.color=i===j?'#000':'var(--mu)';
    });
  }
  const done=Object.keys(S.examSession.answers).filter(k=>S.examSession.answers[k]!==undefined).length;
  const prog=document.querySelector('#root [style*="background:linear-gradient(90deg,var(--ac)"]');
  if(prog)prog.style.width=`${(done/S.examSession.qs.length)*100}%`;
}
function examNav(dir) {
  if(!S.examSession)return;
  const next=S.examSession.cur+dir;
  if(next<0||next>=S.examSession.qs.length){if(dir>0)confirmSubmit();return;}
  S.examSession.cur=next; go('exam');
  setTimeout(()=>{const a=document.getElementById('exam_q_area');if(a)a.scrollTop=0;},50);
}
function goToQ(i) { if(!S.examSession)return; S.examSession.cur=i; togglePalette(); go('exam'); }
function toggleMark(){ if(!S.examSession)return; const c=S.examSession.cur; S.examSession.marked.has(c)?S.examSession.marked.delete(c):S.examSession.marked.add(c); go('exam'); }
function togglePalette(){ const p=document.getElementById('palette_panel'); if(p)p.style.display=p.style.display==='none'?'block':'none'; }
function confirmSubmit(){ const m=document.getElementById('submit_modal'); if(m){m.style.display='flex';m.style.alignItems='flex-end';} }

function submitExam() {
  const ss=S.examSession; if(!ss)return;
  clearInterval(S.examTimer);
  const {qs,answers,startTime,test}=ss;
  const timeTaken=Math.round((Date.now()-startTime)/1000);
  let correct=0,wrong=0,skipped=0;
  qs.forEach((q,i)=>{
    const a=answers[i];
    if(a===undefined||a===null){skipped++;return;}
    parseInt(a)===q.ans?correct++:wrong++;
  });
  const score=Math.round((correct/qs.length)*100);
  const topicMap={};
  qs.forEach((q,i)=>{
    const t=q.topic||'General'; if(!topicMap[t])topicMap[t]={c:0,tot:0};
    topicMap[t].tot++;
    if(answers[i]!==undefined&&parseInt(answers[i])===q.ans)topicMap[t].c++;
  });
  const topicAnalysis=Object.entries(topicMap).map(([name,d])=>({name,correct:d.c,total:d.tot,acc:Math.round(d.c/d.tot*100)})).sort((a,b)=>a.acc-b.acc);
  const result={id:`r_${Date.now()}`,testId:test.id,testName:test.name,userId:S.user?.phone,date:new Date().toISOString(),score,correct,wrong,skipped,total:qs.length,timeTaken,topicAnalysis,answers:{...answers},qs:[...qs]};
  S.examResult=result; S.examSession=null;
  saveResult(result);
  // Save wrong answers
  const wrongQs=qs.filter((_,i)=>answers[i]!==undefined&&parseInt(answers[i])!==qs[i].ans);
  if(wrongQs.length){const ex=LS.g('wrong_qs',[])||[];LS.s('wrong_qs',[...wrongQs,...ex].slice(0,200));}
  go('result');
}

      const a=r.answers[i]; const skip=a===undefined||a===null;
      const ok=!skip&&parseInt(a)===q.ans;
      return `<div class="card" style="margin-bottom:9px;border-color:${skip?'var(--bd)':ok?'rgba(16,185,129,.4)':'rgba(239,68,68,.4)'}">
        <div class="cp">
          <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center">
            <div style="width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;background:${skip?'var(--s2)':ok?'rgba(16,185,129,.2)':'rgba(239,68,68,.2)'};color:${skip?'var(--mu)':ok?'var(--gn)':'var(--rd)'}">${skip?'—':ok?'✓':'✗'}</div>
            <span class="badge b-blue">${q.type?.toUpperCase()||'MCQ'}</span>
            <span style="font-size:11px;color:var(--mu);margin-left:auto">${q.topic||''}</span>
          </div>
          <p style="font-size:13px;font-weight:600;margin-bottom:10px;line-height:1.6" class="${q.lang==='ta'?'ta':''}">${i+1}. ${q.q}</p>
          ${(q.opts||[]).map((opt,j)=>{
            let cls='opt'; const isAns=j===q.ans; const isYours=!skip&&parseInt(a)===j;
            if(isAns)cls+=' ok'; else if(isYours&&!isAns)cls+=' ng';
            return `<div class="${cls}" style="cursor:default;margin-bottom:6px">
              <div class="opt-lt" style="background:${isAns?'var(--gn)':isYours?'var(--rd)':'var(--s2)'};color:${isAns||isYours?'#fff':'var(--mu)'}">${String.fromCharCode(65+j)}</div>
              <span style="font-size:13px;flex:1;text-align:left;line-height:1.5" class="${q.lang==='ta'?'ta':''}">${opt}</span>
              ${isAns?'<span style="color:var(--gn)">✓</span>':''}
              ${isYours&&!isAns?'<span style="color:var(--rd)">✗</span>':''}
            </div>`;
          }).join('')}
          ${q.exp?`<div style="padding:11px 13px;border-radius:11px;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);margin-top:8px"><p style="font-size:12px;font-weight:700;color:var(--ac);margin-bottom:4px">💡 Explanation</p><p style="font-size:12px;color:var(--mu);line-height:1.6" class="${q.lang==='ta'?'ta':''}">${q.exp}</p></div>`:''}
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

async function createRoom() {
  const testId   = document.getElementById('cr_test')?.value;
  const isPublic = document.getElementById('cr_public')?.checked;
  if (!testId) { toast('Select a test', 'error'); return; }
  const btn = document.getElementById('create_room_btn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Opening payment...'; }

  const code = genCode();
  const test  = getTests().find(t => t.id === testId);

  try {
    // Pay with Razorpay — immediate confirmation
    const pay = await payWithRazorpay(S.user, 'room_entry', ROOM_FEE, code);
    if (!pay) {
      if (btn) { btn.disabled = false; btn.innerHTML = '🎮 Pay ₹'+ROOM_FEE+' & Create Room'; }
      return;
    }

    // Create room — active immediately since payment is confirmed
    const room = {
      code, testId:test?.id, testName:test?.name||'Quiz',
      subject: test?.subject||'General', dur:test?.dur||30, qs:test?.qs||[],
      members: [{ name:S.user.name, phone:S.user.phone, joined:new Date().toISOString() }],
      pool:    ROOM_FEE,
      status:  'waiting',
      public:  isPublic,
      hostPhone: S.user.phone,
      hostName:  S.user.name,
      payId:     pay.id,
      hostPaid:  true,
      createdAt: Date.now(),
    };
    saveRoom(room);
    await fsSet('rooms', code, room);
    await syncToSheets({ sheet:'Rooms', code, host:S.user.name, phone:S.user.phone, test:test?.name, created:new Date().toISOString() });
    toast(`Room #${code} created! Share the code with students.`, 'success', 5000);
    go('room_host', { code });
  } catch(e) {
    toast('Failed: ' + e.message, 'error');
    if (btn) { btn.disabled = false; btn.innerHTML = '🎮 Pay ₹'+ROOM_FEE+' & Create Room'; }
  }
}

async function submitJoin(code) {
  const modal = document.getElementById('join_modal');
  const btn   = modal?.querySelector('.btn-gold');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Opening payment...'; }

  try {
    const pay = await payWithRazorpay(S.user, 'room_entry', ROOM_FEE, code);
    if (!pay) {
      if (btn) { btn.disabled=false; btn.innerHTML='Pay ₹'+ROOM_FEE+' & Join →'; }
      return;
    }
    if (modal) modal.style.display = 'none';
    toast('✅ Payment confirmed! You have joined the room.', 'success', 4000);
    // Check if room is live
    const room = getRoom(code);
    if (room?.status === 'live') startRoomExam(code);
    else go('room_waiting', { code });
  } catch(e) {
    toast('Payment failed: ' + e.message, 'error');
    if (btn) { btn.disabled=false; btn.innerHTML='Pay ₹'+ROOM_FEE+' & Join →'; }
  }
}

function startRoomExam(code) {
  const room=getRoom(code);if(!room)return;
  clearInterval(S._roomPoll);S._roomPoll=null;
  S.examSession={test:{id:room.testId,name:room.testName,dur:room.dur||30},qs:shuffle([...room.qs]),answers:{},marked:new Set(),cur:0,timeLeft:(room.dur||30)*60,startTime:Date.now(),roomCode:code};
  clearInterval(S.examTimer);
  S.examTimer=setInterval(()=>{
    if(!S.examSession){clearInterval(S.examTimer);return;}
    S.examSession.timeLeft--;
    const el=document.getElementById('exam_timer');
    if(el)el.textContent='⏱ '+fmtTime(S.examSession.timeLeft);
    if(S.examSession.timeLeft<=0){clearInterval(S.examTimer);submitRoomExam();}
  },1000);
  go('exam');
}

function submitRoomExam(){
  const ss=S.examSession;if(!ss)return;
  clearInterval(S.examTimer);
  const {qs,answers,startTime,roomCode}=ss;
  let correct=0;
  qs.forEach((q,i)=>{if(answers[i]!==undefined&&parseInt(answers[i])===q.ans)correct++;});
  const score=Math.round((correct/qs.length)*100);
  const timeTaken=Math.round((Date.now()-startTime)/1000);
  // Update member score in room
  const rooms=getRooms();const ri=rooms.findIndex(r=>r.code===roomCode);
  if(ri>=0){
    const mi=rooms[ri].members?.findIndex(m=>m.phone===S.user.phone);
    if(mi>=0){rooms[ri].members[mi].done=true;rooms[ri].members[mi].score=score;rooms[ri].members[mi].timeTaken=timeTaken;}
    saveRooms(rooms);
    fsUpdate('rooms',roomCode,{members:rooms[ri].members}).catch(()=>{});
  }
  S.examResult={testId:ss.test.id,testName:ss.test.name+'  (Room #'+roomCode+')',userId:S.user.phone,date:new Date().toISOString(),score,correct,wrong:qs.length-correct,skipped:0,total:qs.length,timeTaken,qs,answers};
  S.examSession=null;
  saveResult(S.examResult);
  go('room_leaderboard',{code:roomCode});
}

async function settleRoom(code, winnerPhone, winnerName) {
  const rooms = getRooms();
  const ri    = rooms.findIndex(r => r.code === code);
  if (ri < 0) return;
  const p = prizePool(rooms[ri]);
  rooms[ri].status     = 'done';
  rooms[ri].winnerPhone = winnerPhone;
  rooms[ri].winnerName  = winnerName;
  rooms[ri].prizes      = p;
  rooms[ri].settledAt   = new Date().toISOString();
  saveRooms(rooms);
  await fsSet('rooms', code, rooms[ri]);

  // Sync settlement to Google Sheets
  await syncToSheets({
    sheet:       'RoomSettlements',
    roomCode:    code,
    testName:    rooms[ri].testName,
    winner:      winnerName,
    winnerPhone: winnerPhone,
    prizePool:   '₹' + p.pool,
    winnerPrize: '₹' + p.winner,
    creatorPrize:'₹' + p.creator,
    adminShare:  '₹' + p.admin,
    settledAt:   rooms[ri].settledAt,
  });

  // Show settlement alert
  toast(`🏆 Winner: ${winnerName} · Prize: ₹${p.winner}
💰 Your share (admin): ₹${p.admin}
📤 Pay winner via UPI: ₹${p.winner}`, 'success', 8000);
  clearInterval(S._lbPoll); S._lbPoll = null;
  render();
}

}

async function adminApproveUser(phone){
  const users=getUsers();const i=users.findIndex(u=>u.phone===phone);
  if(i>=0){users[i].status='active';users[i].approvedAt=new Date().toISOString();saveUsers(users);await fsUpdate('users',phone,{status:'active',approvedAt:users[i].approvedAt}).catch(()=>{});}
  toast(`✅ ${users[i]?.name||phone} approved!`,'success');render();
}
async function adminBanUser(phone){
  if(!confirm('Ban this user?'))return;
  const users=getUsers();const i=users.findIndex(u=>u.phone===phone);
  if(i>=0){users[i].status='banned';saveUsers(users);await fsUpdate('users',phone,{status:'banned'}).catch(()=>{});}
  toast('User banned','warning');render();
}

async function detectPDF(file) {
  S.data={...S.data,uploadStage:'detecting',fileName:file.name};
  render();
  await new Promise(r=>setTimeout(r,100));
  const status=document.getElementById('detect_status');
  try {
    let text='';
    if(file.name.endsWith('.txt')){
      text=await new Promise((res,rej)=>{const r=new FileReader();r.onload=e=>res(e.target.result||'');r.onerror=rej;r.readAsText(file);});
    } else {
      if(status)status.textContent='Extracting PDF text...';
      pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const buf=await file.arrayBuffer();
      const pdf=await pdfjsLib.getDocument({data:buf}).promise;
      for(let p=1;p<=pdf.numPages;p++){const pg=await pdf.getPage(p);const ct=await pg.getTextContent();text+=ct.items.map(i=>i.str).join(' ')+'\n';}
    }
    S.data.extractedText=text;
    if(status)status.textContent=`Extracted ${text.length.toLocaleString()} chars. Detecting Q&A...`;
    await new Promise(r=>setTimeout(r,300));
    const parsed=parseQA(text);
    S.data={...S.data,uploadStage:'settings',detected:{qCount:parsed.length,parsed:parsed.length>=3?parsed:null}};
    render();
  } catch(e){toast('Failed to read file: '+e.message,'error');S.data={...S.data,uploadStage:'idle'};render();}
}

function parseQA(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(Boolean);
  const qs=[];let i=0;
  while(i<lines.length){
    const qm=lines[i].match(/^(?:Q\.?\s*)?([0-9]{1,3})[.)]\s*(.{10,})/i);
    if(!qm){i++;continue;}
    const qText=qm[2].trim();
    const opts=[];let ans=-1,j=i+1;
    while(j<lines.length&&opts.length<4){
      const om=lines[j].match(/^[\[(]?([A-Da-d])[.)]\s*(.+)/);
      if(om){const txt=om[2].replace(/[✓✔*]/g,'').trim();if(lines[j].match(/[✓✔]/))ans=opts.length;opts.push(txt);j++;}else break;
    }
    for(let k=j;k<Math.min(j+4,lines.length);k++){
      const am=lines[k].match(/^(?:ans(?:wer)?|key)[:\s]+\(?([A-Da-d1-4])\)?/i);
      if(am){const ch=am[1].toUpperCase();const idx={'A':0,'B':1,'C':2,'D':3,'1':0,'2':1,'3':2,'4':3}[ch];if(idx!==undefined){ans=idx;j=k+1;}break;}
    }
    if(opts.length===4)qs.push({id:`q${qs.length}`,type:'mcq',q:qText,opts,ans:ans>=0?ans:0,exp:ans>=0?`Correct: ${opts[ans]}`:'',topic:'General',diff:'Medium'});
    i=j;
  }
  return qs;
}

function setProgress(pct,msg){
  const b=document.getElementById('proc_bar');const p=document.getElementById('proc_pct');const s=document.getElementById('proc_steps');
  if(b)b.style.width=pct+'%';if(p)p.textContent=pct+'%';
  if(s&&msg){const d=document.createElement('div');d.style.cssText='display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:9px;background:rgba(16,185,129,.08);margin-bottom:6px;font-size:13px;color:var(--gn)';d.innerHTML='✅ '+msg;s.appendChild(d);}
}

async function processDirectPDF(){
  const name=document.getElementById('up_name')?.value?.trim();
  const sub=document.getElementById('up_sub')?.value||'General Studies';
  const dur=parseInt(document.getElementById('up_dur')?.value)||60;
  if(!name){toast('Enter test name','error');return;}
  S.data={...S.data,uploadStage:'processing'};render();await new Promise(r=>setTimeout(r,100));
  setProgress(20,'Reading questions...');await new Promise(r=>setTimeout(r,400));
  const qs=S.data.detected?.parsed||[];
  setProgress(80,`${qs.length} questions loaded`);await new Promise(r=>setTimeout(r,300));
  const test={id:'test_'+Date.now(),name,subject:sub,dur,diff:'Mixed',qs,published:false,createdAt:new Date().toISOString()};
  const ts=LS.g('tests',[])||[];ts.unshift(test);saveTests(ts);
  setProgress(100,'Test saved!');await new Promise(r=>setTimeout(r,300));
  S.data={...S.data,uploadStage:'done',lastTest:test};render();
}

async function processAIPDF(){
  const name=document.getElementById('up_name')?.value?.trim();
  const sub=document.getElementById('up_sub')?.value||'General Studies';
  const dur=parseInt(document.getElementById('up_dur')?.value)||60;
  const count=parseInt(document.getElementById('up_count')?.value)||20;
  const qtype=document.getElementById('up_qtype')?.value||'mixed';
  if(!name){toast('Enter test name','error');return;}
  const key=LS.g('groq_key','')||GROQ_KEY;
  if(!key){toast('No Groq API key. Add in settings.','error');return;}
  S.data={...S.data,uploadStage:'processing'};render();await new Promise(r=>setTimeout(r,100));
  setProgress(10,'Reading PDF...');
  const text=S.data.extractedText||'';
  if(text.length<50){toast('Could not read text from PDF. Try a .txt file.','error');S.data={...S.data,uploadStage:'settings'};render();return;}
  setProgress(30,'Sending to AI...');await new Promise(r=>setTimeout(r,300));
  const prompt=`Generate ${count} TNPSC-style questions from this text only. No external knowledge. Return ONLY a JSON array:\n[{"type":"mcq","q":"Q?","opts":["A","B","C","D"],"ans":0,"exp":"Explanation.","topic":"Topic","diff":"Easy"}]\ndiff: Easy/Medium/Hard, ans: 0-3 (index)\n\nTEXT:\n${text.slice(0,7000)}`;
  try{
    setProgress(50,'Calling Groq AI...');
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},body:JSON.stringify({model:'llama3-70b-8192',temperature:.3,max_tokens:4096,messages:[{role:'system',content:'Output ONLY valid JSON array. No markdown.'},{role:'user',content:prompt}]})});
    if(!res.ok){const e=await res.json().catch(()=>({}));toast('AI Error: '+(e?.error?.message||'HTTP '+res.status),'error');S.data={...S.data,uploadStage:'settings'};render();return;}
    const data=await res.json();
    const raw=data.choices?.[0]?.message?.content||'';
    const s=raw.indexOf('['),e=raw.lastIndexOf(']');
    if(s<0||e<0){toast('AI returned bad format','error');S.data={...S.data,uploadStage:'settings'};render();return;}
    const qs=JSON.parse(raw.slice(s,e+1));
    setProgress(90,'Questions generated!');await new Promise(r=>setTimeout(r,300));
    const test={id:'test_'+Date.now(),name,subject:sub,dur,diff:'Mixed',qs:qs.map((q,i)=>({...q,id:'ai_'+i})),published:false,createdAt:new Date().toISOString()};
    const ts=LS.g('tests',[])||[];ts.unshift(test);saveTests(ts);
    setProgress(100,'Done!');await new Promise(r=>setTimeout(r,300));
    S.data={...S.data,uploadStage:'done',lastTest:test};render();
  }catch(err){toast('AI failed: '+err.message,'error');S.data={...S.data,uploadStage:'settings'};render();}
}

function init(){
  // Theme
  const theme=LS.g('theme','dark');
  document.documentElement.setAttribute('data-theme',theme);
  if(theme==='light'){document.documentElement.style.cssText='--bg:#f8faff;--sf:#fff;--s2:#eef2ff;--s3:#e2e8ff;--bd:rgba(0,0,0,.08);--b2:rgba(0,0,0,.14);--tx:#0f172a;--mu:#4a5580';}

  // Restore session
  const session=getSession();
  if(session){
    S.user=session;
    if(session.role==='admin')           go('admin');
    else if(session.status==='active')   go('home');
    else if(session.status==='pending')  go('pending');
    else                                  go('login');
  } else {
    go('login');
  }
}
